<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Adblock Editor - Dark Green Edition</title>
    <style>
        :root {
            --bg-dark: #000000;
            --container-bg: #050505;
            --accent-green: #15803d;
            --accent-hover: #166534;
            --text-white: #ffffff;
            --border-color: #1a1a1a;
            --status-gray-bg: #1a1a1a;
            --status-text-gray: #666;
            --safe-area-inset-bottom: env(safe-area-inset-bottom, 0px);
        }

        * {
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            width: 100%;
            font-family: 'Inter', -apple-system, system-ui, sans-serif;
            background-color: var(--bg-dark);
            color: var(--text-white);
            overflow: hidden;
        }

        .editor-container {
            display: flex;
            flex-direction: column;
            height: 100vh;
            max-width: 100%;
            margin: 0 auto;
            background-color: var(--bg-dark);
        }

        .toolbar {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0.75rem 1.25rem;
            border-bottom: 1px solid var(--border-color);
            background-color: #000000;
            z-index: 10;
        }

        .info-path {
            font-weight: 900;
            font-size: 1.1rem;
            letter-spacing: 2px;
            color: var(--accent-green);
            text-transform: uppercase;
        }

        .actions {
            display: flex;
            align-items: center;
            min-height: 38px;
        }

        /* Khung trạng thái & Nút bấm chung */
        .status-pill {
            padding: 0.6rem 1.5rem;
            border-radius: 50px; 
            font-size: 0.75rem;
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: 1px;
            white-space: nowrap;
            display: none; 
            align-items: center;
            justify-content: center;
            min-width: 110px;
            transition: background-color 0.3s ease;
            user-select: none;
            border: none;
            outline: none;
        }

        .status-pill.visible {
            display: inline-flex;
        }

        /* Nút Lưu Lại (Màu xanh hoạt động) */
        #svBtn {
            background-color: var(--accent-green);
            color: #ffffff;
            cursor: pointer;
        }

        #svBtn:hover:not(:disabled) {
            background-color: var(--accent-hover);
        }

        #svBtn:active:not(:disabled) {
            transform: scale(0.96);
        }

        /* Trạng thái nền xám chữ xám (Loading, Saved, Saving) */
        .pill-gray-style {
            background-color: var(--status-gray-bg) !important;
            color: var(--status-text-gray) !important;
            cursor: default;
        }

        /* Hiệu ứng nhịp thở cho màu chữ */
        .breathing-text {
            animation: text-pulse 1.6s ease-in-out infinite;
        }

        @keyframes text-pulse {
            0% { opacity: 1; }
            50% { opacity: 0.2; }
            100% { opacity: 1; }
        }

        .textarea-wrapper {
            flex: 1;
            display: flex;
            flex-direction: column;
            padding: 0.5rem;
        }

        #txtAr {
            flex: 1;
            width: 100%;
            border: 1px solid var(--border-color);
            outline: none;
            padding: 1.25rem;
            font-family: 'JetBrains Mono', 'Fira Code', 'Menlo', monospace;
            font-size: 0.9rem;
            line-height: 1.6;
            background-color: #050505;
            color: var(--text-white);
            resize: none;
            border-radius: 8px;
            padding-bottom: calc(1.5rem + var(--safe-area-inset-bottom));
        }

        #txtAr:focus {
            border-color: var(--accent-green);
        }

        @media (max-width: 640px) {
            .info-path { font-size: 0.95rem; }
            .status-pill { padding: 0.5rem 1.2rem; font-size: 0.7rem; min-width: 90px; }
        }
    </style>
</head>
<body>

<div class="editor-container">
    <div class="toolbar">
        <div class="info-path">ADBLOCK EDITOR</div>
        <div class="actions">
            <!-- Khu vực hiển thị text cho trạng thái tải hoặc lỗi -->
            <div id="statusContainer" class="status-pill"></div>
            <!-- Khu vực nút bấm cho trạng thái Lưu/Đang lưu/Đã lưu -->
            <button id="svBtn" class="status-pill"></button>
        </div>
    </div>

    <div class="textarea-wrapper">
        <textarea id="txtAr" spellcheck="false" placeholder="Đang kết nối..."></textarea>
    </div>
</div>

<script>
(function() {
    const _0x_u1 = ["Z2hwX3RLZzVQTFlk", "VlQweElPcko0R3VaSVU4S0M2V3BoTDNoUXhuZw=="];
    const _init_key = () => atob(_0x_u1[0] + _0x_u1[1]);

    const _app_opt = {
        _k: _init_key(),
        _o: "ghimtui",
        _r: "ghimtui.github.io",
        _p: "file/ads.txt"
    };

    const _ep_url = `https://api.github.com/repos/${_app_opt._o}/${_app_opt._r}/contents/${_app_opt._p}`;
    
    const _dom_ar = document.getElementById('txtAr');
    const _dom_sv = document.getElementById('svBtn');
    const _dom_st = document.getElementById('statusContainer');

    let _v_sha = null;
    let _last_saved_content = ""; 

    function setBtnState(state) {
        // Reset classes
        _dom_sv.classList.remove('visible', 'pill-gray-style', 'breathing-text');
        _dom_st.classList.remove('visible', 'pill-gray-style', 'breathing-text');
        _dom_sv.style.color = "";
        _dom_st.style.color = "";
        _dom_sv.disabled = false;

        switch(state) {
            case 'loading':
                _dom_st.innerText = "ĐANG TẢI...";
                _dom_st.classList.add('visible', 'pill-gray-style');
                break;

            case 'saved':
                _dom_sv.innerText = "ĐÃ LƯU";
                _dom_sv.disabled = true;
                _dom_sv.classList.add('visible', 'pill-gray-style');
                break;

            case 'unsaved':
                _dom_sv.innerText = "LƯU LẠI";
                _dom_sv.classList.add('visible'); 
                break;

            case 'saving':
                _dom_sv.innerText = "ĐANG LƯU...";
                _dom_sv.disabled = true;
                _dom_sv.classList.add('visible', 'pill-gray-style', 'breathing-text');
                break;

            case 'error_connect':
                _dom_st.innerText = "LỖI KẾT NỐI";
                _dom_st.classList.add('visible', 'pill-gray-style');
                _dom_st.style.color = "#ef4444"; 
                break;

            case 'error_save':
                _dom_sv.innerText = "LỖI";
                _dom_sv.disabled = true;
                _dom_sv.classList.add('visible', 'pill-gray-style');
                _dom_sv.style.color = "#ef4444";
                setTimeout(() => setBtnState('unsaved'), 2000);
                break;
        }
    }

    // Logic Adblock xử lý nội dung
    function _remove_subdomain_prefixes(domain) {
        if (!domain) return "";
        const prefixes = ["m.", "shop.", "api.", "news.", "mobile.", "v.", "app."];
        let cleaned = domain.toLowerCase();
        for (let p of prefixes) { if (cleaned.startsWith(p)) return domain.substring(p.length); }
        return domain;
    }

    function _standardize_content(rawInput) {
        let lines = rawInput.split('\n').map(l => l.trim()).filter(l => l !== "");
        let bodyLines = [];
        lines.forEach(line => {
            if (line.match(/! (Title|Description|Describe|Updated|Version|Blocked|Size|=======)/i) || line.startsWith("[Adblock")) return;
            if (!line.startsWith('!')) bodyLines.push(line);
        });
        let mergedMap = new Map();
        let otherRules = []; 
        bodyLines.forEach(line => {
            if (line.includes('##') && !line.startsWith('@@')) {
                let parts = line.split('##');
                let domain = _remove_subdomain_prefixes(parts[0].trim());
                let selector = parts.slice(1).join('##');
                if (!mergedMap.has(domain)) mergedMap.set(domain, new Set());
                selector.split(',').forEach(s => {
                    const trimmedS = s.trim();
                    if (trimmedS) mergedMap.get(domain).add(trimmedS);
                });
            } else { otherRules.push(line); }
        });
        let processedBody = [];
        mergedMap.forEach((selectors, domain) => {
            const sortedSelectors = Array.from(selectors).sort();
            processedBody.push(`${domain}##${sortedSelectors.join(',')}`);
        });
        processedBody = [...processedBody, ...otherRules];
        const strictSort = (a, b) => a < b ? -1 : (a > b ? 1 : 0);
        let whitelistRules = Array.from(new Set(processedBody.filter(line => line.startsWith("@@||")))).sort(strictSort);
        let normalRules = Array.from(new Set(processedBody.filter(line => !line.startsWith("@@||") && line !== ""))).sort(strictSort);
        let uniqueBody = [...normalRules, ...whitelistRules];
        let realRuleCount = uniqueBody.filter(line => line.trim().length > 0 && !line.startsWith('!')).length;
        let version = "1.0.0";
        const v_match = rawInput.match(/!\s*Version:\s*(\d+)\.(\d+)\.(\d+)/i);
        if (v_match) {
            let v_major = v_match[1], v_minor = v_match[2], v_patch = parseInt(v_match[3]) + 1;
            version = `${v_major}.${v_minor}.${v_patch}`;
        }
        const now = new Date();
        const time_str = now.toLocaleString('en-GB', { day: '2-digit', month: 'short', year: 'numeric', hour: '2-digit', minute: '2-digit', hour12: false }).replace(',', '');
        let tempBodyOutput = [];
        let lastGroupKey = "";
        uniqueBody.forEach(line => {
            let currentGroupKey = line.startsWith("@@||") ? "WHITELIST" : (/[a-zA-Z0-9]/.test(line[0]) ? line[0] : "SPECIAL");
            if (lastGroupKey && lastGroupKey !== currentGroupKey) tempBodyOutput.push(""); 
            tempBodyOutput.push(line);
            lastGroupKey = currentGroupKey;
        });
        const headerPrefix = ["[Adblock Plus 2.0]", "! Title: STOP ADS", "! Describe: Chặn quảng cáo", `! Updated: ${time_str}`, `! Version: ${version}`, `! Blocked: ${realRuleCount}`];
        const contentForSize = [...headerPrefix, "! Size: 00.00kb", "! ==================", "", ...tempBodyOutput].join('\n');
        const kbSize = (new TextEncoder().encode(contentForSize).length / 1024).toFixed(2);
        return {
            content: [...headerPrefix, `! Size: ${kbSize}kb`, "! ==================", "", ...tempBodyOutput].join('\n'),
            version: version
        };
    }

    async function _load() {
        setBtnState('loading');
        try {
            const res = await fetch(_ep_url, { headers: { "Authorization": `Bearer ${_app_opt._k}` } });
            if (res.ok) {
                const data = await res.json();
                _v_sha = data.sha;
                const raw = atob(data.content);
                const dec = decodeURIComponent(raw.split('').map(c => '%' + ('00' + c.charCodeAt(0).toString(16)).slice(-2)).join(''));
                _dom_ar.value = dec;
                _last_saved_content = dec;
                setBtnState('saved');
            } else { setBtnState('error_connect'); }
        } catch (e) { setBtnState('error_connect'); }
    }

    _dom_ar.addEventListener('input', () => {
        if (!_v_sha) return;
        if (_dom_ar.value !== _last_saved_content) { setBtnState('unsaved'); } 
        else { setBtnState('saved'); }
    });

    _dom_sv.addEventListener('click', async () => {
        if (_dom_sv.disabled || !_dom_sv.classList.contains('visible')) return;
        setBtnState('saving');
        const result = _standardize_content(_dom_ar.value);
        try {
            const enc = new TextEncoder().encode(result.content);
            const b64 = btoa(String.fromCharCode(...enc));
            const res = await fetch(_ep_url, {
                method: "PUT",
                headers: { "Authorization": `Bearer ${_app_opt._k}`, "Content-Type": "application/json" },
                body: JSON.stringify({ message: `v${result.version}`, content: b64, sha: _v_sha })
            });
            if (res.ok) {
                const d = await res.json();
                _v_sha = d.content.sha;
                _dom_ar.value = result.content;
                _last_saved_content = result.content;
                setBtnState('saved');
            } else { setBtnState('error_save'); }
        } catch (e) { setBtnState('error_save'); }
    });

    window.onload = _load;
})();
</script>

</body>
</html>
