<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Adblock Editor Pro</title>
    <style>
        :root {
            --bg-dark: #000000;
            --container-bg: #050505;
            --accent-green: #15803d;
            --accent-hover: #166534;
            --accent-blue: #1d4ed8;
            --text-white: #ffffff;
            --border-color: #1a1a1a;
            --status-gray-bg: #1a1a1a;
            --status-text-gray: #666;
            --error-red: #ef4444;
            --safe-area-inset-bottom: env(safe-area-inset-bottom, 0px);
        }

        * {
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            width: 100%;
            font-family: 'Inter', -apple-system, system-ui, sans-serif;
            background-color: var(--bg-dark);
            color: var(--text-white);
            overflow: hidden;
        }

        .editor-container {
            display: flex;
            flex-direction: column;
            height: 100vh;
            max-width: 100%;
            margin: 0 auto;
            background-color: var(--bg-dark);
        }

        .toolbar {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0.75rem 1.25rem;
            border-bottom: 1px solid var(--border-color);
            background-color: #000000;
            z-index: 10;
        }

        .info-path {
            font-weight: 900;
            font-size: 1.2rem;
            letter-spacing: 2px;
            color: var(--accent-green);
            text-transform: uppercase;
        }

        .tab-nav {
            display: flex;
            background: #0a0a0a;
            border-bottom: 1px solid var(--border-color);
            padding: 0 1rem;
        }

        .tab-btn {
            padding: 0.8rem 1.2rem;
            color: #555;
            background: none;
            border: none;
            font-size: 0.8rem;
            font-weight: 700;
            cursor: pointer;
            text-transform: uppercase;
            letter-spacing: 1px;
            border-bottom: 2px solid transparent;
            transition: all 0.2s;
        }

        .tab-btn.active {
            color: var(--accent-green);
            border-bottom-color: var(--accent-green);
        }

        .tab-content {
            flex: 1;
            display: none;
            flex-direction: column;
            overflow: hidden;
        }

        .tab-content.active {
            display: flex;
        }

        .actions {
            display: flex;
            align-items: center;
            gap: 8px;
            min-height: 38px;
        }

        .status-pill {
            padding: 0.6rem 1.2rem;
            border-radius: 50px; 
            font-size: 0.75rem;
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: 1px;
            white-space: nowrap;
            display: none; 
            align-items: center;
            justify-content: center;
            min-width: 100px;
            transition: all 0.3s ease;
            user-select: none;
            border: none;
            outline: none;
        }

        .status-pill.visible {
            display: inline-flex;
        }

        #svBtn {
            background-color: var(--accent-green);
            color: #ffffff;
            cursor: pointer;
        }

        #svBtn:hover:not(:disabled) {
            background-color: var(--accent-hover);
        }

        .pill-gray-style {
            background-color: var(--status-gray-bg) !important;
            color: var(--status-text-gray) !important;
            cursor: default;
        }

        .fast-flash {
            animation: fast-flash-anim 0.4s ease-in-out infinite;
        }

        @keyframes fast-flash-anim {
            0% { opacity: 1; }
            50% { opacity: 0.3; }
            100% { opacity: 1; }
        }

        .textarea-wrapper {
            flex: 1;
            display: flex;
            flex-direction: column;
            padding: 0.5rem;
        }

        .code-input {
            flex: 1;
            width: 100%;
            border: 1px solid var(--border-color);
            outline: none;
            padding: 1.25rem;
            font-family: 'JetBrains Mono', 'Fira Code', 'Menlo', monospace;
            font-size: 0.9rem;
            line-height: 1.6;
            background-color: #050505;
            color: var(--text-white);
            resize: none;
            border-radius: 8px;
        }

        #txtAr, #prefixInput {
            padding-bottom: calc(1.5rem + var(--safe-area-inset-bottom));
        }

        .code-input:focus {
            border-color: var(--accent-green);
        }

        @media (max-width: 640px) {
            .info-path { font-size: 0.9rem; }
            .status-pill { padding: 0.5rem 0.8rem; font-size: 0.65rem; min-width: 80px; }
            .tab-btn { padding: 0.8rem 0.6rem; font-size: 0.65rem; }
            .actions { gap: 5px; }
        }
    </style>
</head>
<body>

<div class="editor-container">
    <div class="toolbar">
        <div class="info-path">ADBLOCK PRO</div>
        <div class="actions">
            <div id="statusContainer" class="status-pill"></div>
            <button id="svBtn" class="status-pill"></button>
        </div>
    </div>

    <div class="tab-nav">
        <button id="btn-tab-editor" class="tab-btn active" onclick="switchTab('editor')">Bộ lọc</button>
        <button id="btn-tab-config" class="tab-btn" onclick="switchTab('config')">Tiền tố</button>
    </div>

    <div id="tab-editor" class="tab-content active">
        <div class="textarea-wrapper">
            <textarea id="txtAr" class="code-input" spellcheck="false" placeholder="Đang tải bộ lọc..."></textarea>
        </div>
    </div>

    <div id="tab-config" class="tab-content">
        <div class="textarea-wrapper">
            <textarea id="prefixInput" class="code-input" spellcheck="false" placeholder="Đang tải tiền tố..."></textarea>
        </div>
    </div>
</div>

<script>
function switchTab(tabId) {
    document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
    document.querySelectorAll('.tab-content').forEach(content => content.classList.remove('active'));
    
    document.getElementById('btn-tab-' + tabId).classList.add('active');
    document.getElementById('tab-' + tabId).classList.add('active');
}

function formatPrefixesSmart(input) {
    if (!input) return "";
    let cleanedInput = input.replace(/,/g, ' ').replace(/\.+(?=\w|\.|$)/g, ' '); 
    let rawList = cleanedInput.split(/\s+/).map(p => p.trim()).filter(p => p !== "");
    let processedList = rawList.map(p => p.toLowerCase().replace(/\.+$/, '') + '.');
    let uniqueSorted = [...new Set(processedList)].sort((a, b) => a.localeCompare(b));
    
    if (uniqueSorted.length === 0) return "";
    let result = [];
    let lastChar = "";
    
    uniqueSorted.forEach(item => {
        let currentChar = item.charAt(0).toLowerCase();
        if (lastChar && currentChar !== lastChar) {
            result.push("\n\n" + item);
        } else {
            result.push(item);
        }
        lastChar = currentChar;
    });

    return result.join(' ').replace(/ \n/g, '\n').replace(/\n /g, '\n').trim();
}

(function() {
    const _0x_u1 = ["Z2hwX3RLZzVQTFlk", "VlQweElPcko0R3VaSVU4S0M2V3BoTDNoUXhuZw=="];
    const _init_key = () => atob(_0x_u1[0] + _0x_u1[1]);

    const _app_opt = {
        _k: _init_key(),
        _o: "ghimtui",
        _r: "ghimtui.github.io",
        _p_ads: "file/ads.txt",
        _p_pref: "file/ads-prefix.txt",
        _p_block: "file/ads-block.txt",
        _p_whitelist: "file/ads-whitelist.txt",
        _p_unhide: "file/ads-unhide.txt"
    };

    const _api_base = `https://api.github.com/repos/${_app_opt._o}/${_app_opt._r}/contents/`;
    const _dom_ar = document.getElementById('txtAr');
    const _dom_sv = document.getElementById('svBtn');
    const _dom_st = document.getElementById('statusContainer');
    const _dom_prefix = document.getElementById('prefixInput');

    let _v_shas = { ads: null, pref: null, block: null, whitelist: null, unhide: null };
    let _last_saved_content = "", _last_saved_prefixes = "";
    let _is_loading = true;

    function setBtnState(state) {
        _dom_sv.classList.remove('visible', 'pill-gray-style', 'fast-flash');
        _dom_st.classList.remove('visible', 'pill-gray-style');
        _dom_sv.disabled = false;
        
        switch(state) {
            case 'loading': 
                _dom_st.innerText = "ĐỒNG BỘ..."; 
                _dom_st.classList.add('visible', 'pill-gray-style'); 
                break;
            case 'saved': 
                _dom_sv.innerText = "ĐÃ LƯU"; 
                _dom_sv.disabled = true; 
                _dom_sv.classList.add('visible', 'pill-gray-style'); 
                break;
            case 'unsaved': 
                _dom_sv.innerText = "LƯU LẠI"; 
                _dom_sv.classList.add('visible'); 
                break;
            case 'saving': 
                _dom_sv.innerText = "LƯU LẠI...";
                _dom_sv.disabled = true; 
                _dom_sv.classList.add('visible', 'fast-flash');
                break;
            case 'offline':
                _dom_st.innerText = "MẤT KẾT NỐI"; 
                _dom_st.classList.add('visible', 'pill-gray-style'); 
                _dom_st.style.color = "var(--error-red)";
                _dom_sv.disabled = true;
                break;
            case 'error': 
                _dom_st.innerText = "LỖI XẢY RA"; 
                _dom_st.classList.add('visible', 'pill-gray-style'); 
                _dom_st.style.color = "var(--error-red)"; 
                break;
        }
    }

    function checkChanges() {
        if (_is_loading) return;
        if (!navigator.onLine) {
            setBtnState('offline');
            return;
        }
        
        const hasContentChanged = _dom_ar.value !== _last_saved_content;
        const hasPrefixChanged = _dom_prefix.value !== _last_saved_prefixes;

        if (hasContentChanged || hasPrefixChanged) {
            setBtnState('unsaved');
        } else {
            setBtnState('saved');
        }
    }

    function _remove_subdomain_prefixes(domain) {
        if (!domain) return "";
        let cleaned = domain.toLowerCase().trim();
        const activePrefixes = _dom_prefix.value.split(/\s+/).map(p => p.trim()).filter(p => p !== "" && p !== ".").sort((a, b) => b.length - a.length);
        let parts = cleaned.split('.');
        if (parts.length <= 2) return cleaned;
        let currentParts = [...parts];
        while (currentParts.length > 2) {
            let firstLabel = currentParts[0] + '.';
            if (activePrefixes.includes(firstLabel)) currentParts.shift();
            else break;
        }
        return currentParts.join('.');
    }

    function _is_valid_domain(str) {
        if (!str) return false;
        if (!str.includes('.') || str.startsWith('.') || str.endsWith('.')) return false;
        return /^[a-z0-9.-]+\.[a-z]{2,}$/i.test(str);
    }

    function _standardize_content(rawInput) {
        let rawLines = rawInput.split('\n');
        let bodyLines = [];
        let oldMeta = { u: "" };

        rawLines.forEach(line => {
            let l = line.trim();
            if (!l) return;
            const uMatch = l.match(/!\s*Updated:\s*(.+)/i);
            if (uMatch) oldMeta.u = uMatch[1];
            if (l.match(/! (Title|Description|Describe|Updated|Version|Blocked|Size|=======)/i) || l.startsWith("[Adblock") || l.startsWith('!')) return;
            bodyLines.push(l);
        });

        let mergedMap = new Map();
        let otherRules = new Set();

        bodyLines.forEach(line => {
            let hideMatch = line.match(/^([^#\[\]\s,]+)(##|#|\[|\.)(.*)$/);
            if (hideMatch && !line.startsWith('@@') && !line.startsWith('/') && !line.startsWith('.') && !line.startsWith('#')) {
                let rawDomain = hideMatch[1].trim();
                if (_is_valid_domain(rawDomain)) {
                    let domain = _remove_subdomain_prefixes(rawDomain);
                    let separator = hideMatch[2];
                    let selectorPart = hideMatch[3];
                    let fullSelector = (separator === '##' ? '' : separator) + selectorPart;
                    if (!mergedMap.has(domain)) mergedMap.set(domain, new Set());
                    let selectors = fullSelector.split(/,(?![^\[]*\])/);
                    selectors.forEach(s => {
                        let trimmed = s.trim();
                        if (trimmed) mergedMap.get(domain).add(trimmed);
                    });
                } else { otherRules.add(line); }
            } else { otherRules.add(line); }
        });

        let processedBody = [];
        mergedMap.forEach((selectors, domain) => {
            processedBody.push(`${domain}##${Array.from(selectors).sort().join(',')}`);
        });
        otherRules.forEach(rule => { if (rule.trim()) processedBody.push(rule.trim()); });

        const strictSort = (a, b) => a.localeCompare(b);
        let uniqueBody = Array.from(new Set(processedBody)).sort(strictSort);

        let blockRules = uniqueBody.filter(l => l.startsWith('||') && !l.startsWith('@@'));
        let whitelistRules = uniqueBody.filter(l => l.startsWith('@@||'));
        let unhideRules = uniqueBody.filter(l => l.includes('#@#'));

        const ruleCount = uniqueBody.filter(line => !line.startsWith('.') && !line.startsWith('##.')).length;
        const currentRulesOnly = uniqueBody.join('\n');
        const isRulesChanged = _last_saved_content.includes(currentRulesOnly) === false; 
        
        let finalUpdateTime = isRulesChanged ? new Date().toLocaleString('en-GB', { day: '2-digit', month: 'short', year: 'numeric', hour: '2-digit', minute: '2-digit', hour12: false }).replace(',', '') : oldMeta.u;

        let tempBodyOutput = [], lastGroupKey = "", lastDomainBase = "";
        uniqueBody.forEach(line => {
            let currentGroupKey = line.startsWith("@@||") ? "WHITELIST" : (/[a-zA-Z0-9]/.test(line[0]) ? line[0].toUpperCase() : "SPECIAL");
            let currentDomainBase = line.startsWith("@@||") ? line.substring(4).split(/[\/\^]/)[0] : (line.includes('##') ? line.split('##')[0] : "");

            if (lastGroupKey && lastGroupKey !== currentGroupKey) tempBodyOutput.push("");
            else if (lastDomainBase && currentDomainBase && lastDomainBase !== currentDomainBase && currentGroupKey !== "SPECIAL") tempBodyOutput.push("");

            tempBodyOutput.push(line);
            lastGroupKey = currentGroupKey;
            lastDomainBase = currentDomainBase;
        });

        const headerArr = [
            "[Adblock Plus 2.0]", 
            "! Title: STOP ADS", 
            "! Describe: Chặn quảng cáo", 
            `! Updated: ${finalUpdateTime}`,
            `! Blocked: ${ruleCount}`,
            "! Size: -- KB",
            "! =================="
        ];
        const finalSize = _format_kb_only(headerArr.join('\n') + "\n\n" + tempBodyOutput.join('\n'));
        headerArr[5] = `! Size: ${finalSize}`;
        
        return { 
            content: [...headerArr, "", ...tempBodyOutput].join('\n'), 
            isRulesChanged: isRulesChanged,
            subFiles: {
                block: blockRules.join('\n'),
                whitelist: whitelistRules.join('\n'),
                unhide: unhideRules.join('\n')
            }
        };
    }

    async function _fetch_file(path) { 
        try {
            const res = await fetch(`${_api_base}${path}`, { headers: { "Authorization": `Bearer ${_app_opt._k}` } }); 
            return res.ok ? await res.json() : null;
        } catch(e) { return null; }
    }
    
    async function _load() {
        if (!navigator.onLine) { setBtnState('offline'); return; }
        setBtnState('loading');
        try {
            const [ads, pref, blk, wht, unh] = await Promise.all([
                _fetch_file(_app_opt._p_ads),
                _fetch_file(_app_opt._p_pref),
                _fetch_file(_app_opt._p_block),
                _fetch_file(_app_opt._p_whitelist),
                _fetch_file(_app_opt._p_unhide)
            ]);

            if (ads) {
                _v_shas.ads = ads.sha;
                _dom_ar.value = _last_saved_content = decodeURIComponent(atob(ads.content).split('').map(c => '%' + ('00' + c.charCodeAt(0).toString(16)).slice(-2)).join(''));
            }
            if (pref) { 
                _v_shas.pref = pref.sha; 
                const prefDec = atob(pref.content);
                _dom_prefix.value = _last_saved_prefixes = formatPrefixesSmart(prefDec); 
            }
            if (blk) _v_shas.block = blk.sha;
            if (wht) _v_shas.whitelist = wht.sha;
            if (unh) _v_shas.unhide = unh.sha;

            _is_loading = false; setBtnState('saved');
        } catch (e) { setBtnState('error'); }
    }

    async function _update_file(path, content, sha, message) {
        return await fetch(`${_api_base}${path}`, {
            method: "PUT",
            headers: { "Authorization": `Bearer ${_app_opt._k}`, "Content-Type": "application/json" },
            body: JSON.stringify({ message: message, content: btoa(String.fromCharCode(...new TextEncoder().encode(content))), sha: sha })
        });
    }

    // Sự kiện nhập liệu
    _dom_ar.addEventListener('input', checkChanges);
    _dom_prefix.addEventListener('input', checkChanges);
    
    // Format khi rời khỏi khung nhập tiền tố
    _dom_prefix.addEventListener('blur', () => {
        if (_is_loading) return;
        const formatted = formatPrefixesSmart(_dom_prefix.value);
        if (formatted !== _dom_prefix.value) {
            _dom_prefix.value = formatted;
            checkChanges();
        }
    });

    _dom_sv.addEventListener('click', async () => {
        if (_dom_sv.disabled || !navigator.onLine) return;
        setBtnState('saving');
        try {
            const fPrefixes = formatPrefixesSmart(_dom_prefix.value);
            const result = _standardize_content(_dom_ar.value);

            const updateTasks = [
                _update_file(_app_opt._p_ads, result.content, _v_shas.ads, result.isRulesChanged ? `update filter` : "format rules"),
                _update_file(_app_opt._p_block, result.subFiles.block, _v_shas.block, "sync block"),
                _update_file(_app_opt._p_whitelist, result.subFiles.whitelist, _v_shas.whitelist, "sync whitelist"),
                _update_file(_app_opt._p_unhide, result.subFiles.unhide, _v_shas.unhide, "sync unhide")
            ];

            if (fPrefixes !== _last_saved_prefixes) {
                updateTasks.push(_update_file(_app_opt._p_pref, fPrefixes, _v_shas.pref, "update prefixes"));
            }

            await Promise.all(updateTasks);
            
            _last_saved_content = result.content;
            _last_saved_prefixes = fPrefixes;
            _dom_ar.value = result.content;
            _dom_prefix.value = fPrefixes;
            
            // Tải lại SHA mới nhất
            await _load();
            setBtnState('saved');
        } catch (e) { setBtnState('error'); }
    });

    window.addEventListener('online', _load);
    window.addEventListener('offline', () => setBtnState('offline'));
    window.onload = _load;
})();
</script>
</body>
</html>
