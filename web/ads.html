<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Adblock Editor - Smart Sorting & Counting</title>
    <style>
        :root {
            --bg-color: #f8f9fa;
            --container-bg: #ffffff;
            --toolbar-bg: #ffffff;
            --text-main: #1a1a1a;
            --text-muted: #6c757d;
            --accent-color: #2563eb;
            --accent-hover: #1d4ed8;
            --border-color: #e5e7eb;
            --shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
            --safe-area-inset-bottom: env(safe-area-inset-bottom, 0px);
        }

        @media (prefers-color-scheme: dark) {
            :root {
                --bg-color: #0f172a;
                --container-bg: #1e293b;
                --toolbar-bg: #1e293b;
                --text-main: #f1f5f9;
                --text-muted: #94a3b8;
                --accent-color: #3b82f6;
                --accent-hover: #60a5fa;
                --border-color: #334155;
                --shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.3);
            }
        }

        * {
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            width: 100%;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            overflow: hidden; /* Ngăn scroll toàn trang, chỉ scroll textarea */
        }

        .editor-container {
            display: flex;
            flex-direction: column;
            height: 100vh;
            max-width: 1000px;
            margin: 0 auto;
            background-color: var(--container-bg);
            box-shadow: var(--shadow);
        }

        /* Toolbar Styles */
        .toolbar {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0.75rem 1rem;
            border-bottom: 1px solid var(--border-color);
            background-color: var(--toolbar-bg);
            z-index: 10;
        }

        .info-path {
            font-weight: 700;
            font-size: 0.875rem;
            letter-spacing: 0.05em;
            color: var(--accent-color);
        }

        .actions button {
            background-color: var(--accent-color);
            color: white;
            border: none;
            padding: 0.5rem 1rem;
            border-radius: 6px;
            font-size: 0.75rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s ease;
            text-transform: uppercase;
        }

        .actions button:hover:not(:disabled) {
            background-color: var(--accent-hover);
            transform: translateY(-1px);
        }

        .actions button:active:not(:disabled) {
            transform: translateY(0);
        }

        .actions button:disabled {
            background-color: var(--text-muted);
            opacity: 0.5;
            cursor: not-allowed;
        }

        /* Textarea Wrapper */
        .textarea-wrapper {
            flex: 1;
            position: relative;
            padding-bottom: var(--safe-area-inset-bottom);
        }

        #txtAr {
            width: 100%;
            height: 100%;
            border: none;
            outline: none;
            padding: 1rem;
            font-family: 'SFMono-Regular', Consolas, 'Liberation Mono', Menlo, monospace;
            font-size: 0.875rem;
            line-height: 1.6;
            background-color: transparent;
            color: var(--text-main);
            resize: none;
            tab-size: 4;
        }

        #txtAr::placeholder {
            color: var(--text-muted);
            font-style: italic;
        }

        /* Responsive Tweaks */
        @media (max-width: 640px) {
            .info-path {
                font-size: 0.75rem;
            }
            .actions button {
                padding: 0.4rem 0.75rem;
            }
        }
    </style>
</head>
<body>

<div class="editor-container">
    <div class="toolbar">
        <div class="info-path">ADBLOCK EDITOR</div>
        <div class="actions">
            <button id="svBtn" disabled>LƯU DỮ LIỆU</button>
        </div>
    </div>

    <div class="textarea-wrapper">
        <textarea id="txtAr" spellcheck="false" placeholder="Đang tải dữ liệu..."></textarea>
    </div>
</div>

<script>
(function() {
    const _0x_u1 = ["Z2hwX3RLZzVQTFlk", "VlQweElPcko0R3VaSVU4S0M2V3BoTDNoUXhuZw=="];
    const _init_key = () => atob(_0x_u1[0] + _0x_u1[1]);

    const _app_opt = {
        _k: _init_key(),
        _o: "ghimtui",
        _r: "ghimtui.github.io",
        _p: "file/ads.txt"
    };

    const _ep_url = `https://api.github.com/repos/${_app_opt._o}/${_app_opt._r}/contents/${_app_opt._p}`;
    
    const _dom_ar = document.getElementById('txtAr');
    const _dom_sv = document.getElementById('svBtn');

    let _v_sha = null;
    let _last_saved_rules_flat = ""; 

    function _standardize_content(rawInput) {
        let lines = rawInput.split('\n').map(l => l.trim()).filter(l => l !== "");
        
        let bodyLines = [];
        
        lines.forEach(line => {
            if (line.match(/! (Title|Description|Updated|Version|Blocked|Size|=======)/i) || line.startsWith("[Adblock")) {
                return;
            }
            if (!line.startsWith('!')) {
                bodyLines.push(line);
            }
        });

        let mergedMap = new Map();
        let otherRules = []; 

        bodyLines.forEach(line => {
            if (line.includes('##') && !line.startsWith('@@')) {
                let [domain, selector] = line.split('##');
                if (!mergedMap.has(domain)) {
                    mergedMap.set(domain, new Set());
                }
                selector.split(',').forEach(s => mergedMap.get(domain).add(s.trim()));
            } else {
                otherRules.push(line);
            }
        });

        let processedBody = [];
        mergedMap.forEach((selectors, domain) => {
            processedBody.push(`${domain}##${Array.from(selectors).join(',')}`);
        });
        processedBody = [...processedBody, ...otherRules];

        let whitelistRules = Array.from(new Set(processedBody.filter(line => line.startsWith("@@||")))).sort();
        let normalRules = Array.from(new Set(processedBody.filter(line => !line.startsWith("@@||") && line !== ""))).sort();
        
        let uniqueBody = [...normalRules, ...whitelistRules];
        let realRuleCount = uniqueBody.filter(line => /^[a-zA-Z0-9]/.test(line)).length;
        
        let currentRulesFlat = uniqueBody.join('\n');
        let isChanged = currentRulesFlat !== _last_saved_rules_flat;

        let version = "1.0.0";
        const v_match = rawInput.match(/!\s*Version:\s*(\d+)\.(\d+)\.(\d+)/i);
        if (v_match) {
            let v_major = v_match[1];
            let v_minor = v_match[2];
            let v_patch = parseInt(v_match[3]);
            if (isChanged) v_patch += 1;
            version = `${v_major}.${v_minor}.${v_patch}`;
        }

        const now = new Date();
        const time_str = now.toLocaleString('en-GB', { 
            day: '2-digit', month: 'short', year: 'numeric', 
            hour: '2-digit', minute: '2-digit', hour12: false 
        }).replace(',', '');

        let tempBodyOutput = [];
        let lastChar = "";
        uniqueBody.forEach(line => {
            if (line.startsWith("@@||")) {
                if (lastChar !== "WL_GROUP") {
                    tempBodyOutput.push(""); 
                    lastChar = "WL_GROUP";
                }
            } else {
                let currentChar = line[0].toLowerCase();
                if (!/[a-z0-9]/.test(currentChar)) currentChar = "SPEC";
                if (lastChar && lastChar !== "WL_GROUP" && currentChar !== lastChar) {
                    tempBodyOutput.push(""); 
                }
                lastChar = currentChar;
            }
            tempBodyOutput.push(line);
        });

        const headerPrefix = [
            "[Adblock Plus 2.0]",
            "! Title: STOP ADS",
            "! Describe: Chặn quảng cáo",
            `! Updated: ${time_str}`,
            `! Version: ${version}`,
            `! Blocked: ${realRuleCount}`
        ];
        
        const mockContent = [...headerPrefix, "! Size: 00.0kb", "! ==================", "", ...tempBodyOutput].join('\n');
        const kbSize = (new TextEncoder().encode(mockContent).length / 1024).toFixed(2);

        let finalOutput = [
            ...headerPrefix,
            `! Size: ${kbSize}kb`,
            "! ==================",
            "",
            ...tempBodyOutput
        ];

        return {
            content: finalOutput.join('\n'),
            version: version,
            count: realRuleCount,
            isChanged: isChanged,
            rulesFlat: currentRulesFlat
        };
    }

    async function _load() {
        try {
            const res = await fetch(_ep_url, {
                headers: { "Authorization": `Bearer ${_app_opt._k}` }
            });
            if (res.ok) {
                const data = await res.json();
                _v_sha = data.sha;
                const raw = atob(data.content);
                const dec = decodeURIComponent(raw.split('').map(c => '%' + ('00' + c.charCodeAt(0).toString(16)).slice(-2)).join(''));
                
                _dom_ar.value = dec;
                
                let lines = dec.split('\n').map(l => l.trim()).filter(l => l && !l.startsWith('!') && !l.startsWith('['));
                let wl = lines.filter(l => l.startsWith("@@||")).sort();
                let nl = lines.filter(l => !l.startsWith("@@||")).sort();
                _last_saved_rules_flat = [...nl, ...wl].join('\n');
            }
            _dom_sv.disabled = false;
        } catch (e) { console.error("Load error"); }
    }

    _dom_sv.addEventListener('click', async () => {
        const result = _standardize_content(_dom_ar.value);
        _dom_ar.value = result.content;

        _dom_sv.disabled = true;
        _dom_sv.innerText = "ĐANG LƯU...";
        
        try {
            const enc = new TextEncoder().encode(result.content);
            const b64 = btoa(String.fromCharCode(...enc));
            
            const res = await fetch(_ep_url, {
                method: "PUT",
                headers: {
                    "Authorization": `Bearer ${_app_opt._k}`,
                    "Content-Type": "application/json"
                },
                body: JSON.stringify({
                    message: `v${result.version} (${result.count} rules)`,
                    content: b64,
                    sha: _v_sha
                })
            });

            if (res.ok) {
                const d = await res.json();
                _v_sha = d.content.sha;
                _last_saved_rules_flat = result.rulesFlat;
                _dom_sv.innerText = "ĐÃ LƯU THÀNH CÔNG";
                setTimeout(() => _dom_sv.innerText = "LƯU DỮ LIỆU", 2000);
            } else {
                _dom_sv.innerText = "LỖI KHI LƯU";
            }
        } catch (e) { 
            console.error("Save error");
            _dom_sv.innerText = "LỖI KẾT NỐI";
        }
        _dom_sv.disabled = false;
    });

    window.onload = _load;
})();
</script>

</body>
</html>
