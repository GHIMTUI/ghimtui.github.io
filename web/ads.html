<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Adblock Editor Pro</title>
    <style>
        :root {
            --bg-dark: #000000;
            --container-bg: #050505;
            --accent-green: #15803d;
            --accent-hover: #166534;
            --accent-blue: #1d4ed8;
            --text-white: #ffffff;
            --border-color: #1a1a1a;
            --status-gray-bg: #1a1a1a;
            --status-text-gray: #666;
            --error-red: #ef4444;
            --safe-area-inset-bottom: env(safe-area-inset-bottom, 0px);
        }

        * {
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            width: 100%;
            font-family: 'Inter', -apple-system, system-ui, sans-serif;
            background-color: var(--bg-dark);
            color: var(--text-white);
            overflow: hidden;
        }

        .editor-container {
            display: flex;
            flex-direction: column;
            height: 100vh;
            max-width: 100%;
            margin: 0 auto;
            background-color: var(--bg-dark);
        }

        .toolbar {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0.75rem 1.25rem;
            border-bottom: 1px solid var(--border-color);
            background-color: #000000;
            z-index: 10;
        }

        .info-path {
            font-weight: 900;
            font-size: 1.2rem;
            letter-spacing: 2px;
            color: var(--accent-green);
            text-transform: uppercase;
        }

        .tab-nav {
            display: flex;
            background: #0a0a0a;
            border-bottom: 1px solid var(--border-color);
            padding: 0 1rem;
        }

        .tab-btn {
            padding: 0.8rem 1.2rem;
            color: #555;
            background: none;
            border: none;
            font-size: 0.8rem;
            font-weight: 700;
            cursor: pointer;
            text-transform: uppercase;
            letter-spacing: 1px;
            border-bottom: 2px solid transparent;
            transition: all 0.2s;
        }

        .tab-btn.active {
            color: var(--accent-green);
            border-bottom-color: var(--accent-green);
        }

        .tab-content {
            flex: 1;
            display: none;
            flex-direction: column;
            overflow: hidden;
        }

        .tab-content.active {
            display: flex;
        }

        .actions {
            display: flex;
            align-items: center;
            gap: 8px;
            min-height: 38px;
        }

        .status-pill {
            padding: 0.6rem 1.2rem;
            border-radius: 50px; 
            font-size: 0.75rem;
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: 1px;
            white-space: nowrap;
            display: none; 
            align-items: center;
            justify-content: center;
            min-width: 100px;
            transition: all 0.3s ease;
            user-select: none;
            border: none;
            outline: none;
        }

        .status-pill.visible {
            display: inline-flex;
        }

        #svBtn {
            background-color: var(--accent-green);
            color: #ffffff;
            cursor: pointer;
        }

        #svBtn:hover:not(:disabled) {
            background-color: var(--accent-hover);
        }

        .pill-gray-style {
            background-color: var(--status-gray-bg) !important;
            color: var(--status-text-gray) !important;
            cursor: default;
        }

        .fast-flash {
            animation: fast-flash-anim 0.4s ease-in-out infinite;
        }

        @keyframes fast-flash-anim {
            0% { opacity: 1; }
            50% { opacity: 0.3; }
            100% { opacity: 1; }
        }

        .textarea-wrapper {
            flex: 1;
            display: flex;
            flex-direction: column;
            padding: 0.5rem;
        }

        .code-input {
            flex: 1;
            width: 100%;
            border: 1px solid var(--border-color);
            outline: none;
            padding: 1.25rem;
            font-family: 'JetBrains Mono', 'Fira Code', 'Menlo', monospace;
            font-size: 0.9rem;
            line-height: 1.6;
            background-color: #050505;
            color: var(--text-white);
            resize: none;
            border-radius: 8px;
        }

        #txtAr, #prefixInput {
            padding-bottom: calc(1.5rem + var(--safe-area-inset-bottom));
        }

        .code-input:focus {
            border-color: var(--accent-green);
        }

        @media (max-width: 640px) {
            .info-path { font-size: 0.9rem; }
            .status-pill { padding: 0.5rem 0.8rem; font-size: 0.65rem; min-width: 80px; }
            .tab-btn { padding: 0.8rem 0.6rem; font-size: 0.65rem; }
            .actions { gap: 5px; }
        }
    </style>
</head>
<body>

<div class="editor-container">
    <div class="toolbar">
        <div class="info-path">ADBLOCK PRO</div>
        <div class="actions">
            <div id="statusContainer" class="status-pill"></div>
            <button id="svBtn" class="status-pill"></button>
        </div>
    </div>

    <div class="tab-nav">
        <button id="btn-tab-editor" class="tab-btn active" onclick="switchTab('editor')">Bộ lọc</button>
        <button id="btn-tab-config" class="tab-btn" onclick="switchTab('config')">Tiền tố</button>
    </div>

    <div id="tab-editor" class="tab-content active">
        <div class="textarea-wrapper">
            <textarea id="txtAr" class="code-input" spellcheck="false" placeholder="Đang tải bộ lọc..."></textarea>
        </div>
    </div>

    <div id="tab-config" class="tab-content">
        <div class="textarea-wrapper">
            <textarea id="prefixInput" class="code-input" spellcheck="false" placeholder="Đang tải tiền tố..."></textarea>
        </div>
    </div>
</div>

<script>
function switchTab(tabId) {
    document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
    document.querySelectorAll('.tab-content').forEach(content => content.classList.remove('active'));
    
    document.getElementById('btn-tab-' + tabId).classList.add('active');
    document.getElementById('tab-' + tabId).classList.add('active');

    if (tabId === 'editor') {
        const pInput = document.getElementById('prefixInput');
        if (pInput) pInput.value = formatPrefixesSmart(pInput.value);
    }
}

function formatPrefixesSmart(input) {
    if (!input) return "";
    let cleanedInput = input.replace(/,/g, ' ').replace(/\.+(?=\w|\.|$)/g, ' '); 
    let rawList = cleanedInput.split(/\s+/).map(p => p.trim()).filter(p => p !== "");
    let processedList = rawList.map(p => p.toLowerCase().replace(/\.+$/, '') + '.');
    let uniqueSorted = [...new Set(processedList)].sort((a, b) => a.localeCompare(b));
    
    if (uniqueSorted.length === 0) return "";
    let result = [];
    let lastChar = "";
    
    uniqueSorted.forEach(item => {
        let currentChar = item.charAt(0).toLowerCase();
        if (lastChar && currentChar !== lastChar) {
            result.push("\n\n" + item);
        } else {
            result.push(item);
        }
        lastChar = currentChar;
    });

    return result.join(' ').replace(/ \n/g, '\n').replace(/\n /g, '\n').trim();
}

(function() {
    const _0x_u1 = ["Z2hwX3RLZzVQTFlk", "VlQweElPcko0R3VaSVU4S0M2V3BoTDNoUXhuZw=="];
    const _init_key = () => atob(_0x_u1[0] + _0x_u1[1]);

    const _app_opt = {
        _k: _init_key(),
        _o: "ghimtui",
        _r: "ghimtui.github.io",
        _p_ads: "file/ads.txt",
        _p_pref: "file/ads-prefix.txt"
    };

    const _api_base = `https://api.github.com/repos/${_app_opt._o}/${_app_opt._r}/contents/`;
    const _dom_ar = document.getElementById('txtAr');
    const _dom_sv = document.getElementById('svBtn');
    const _dom_st = document.getElementById('statusContainer');
    const _dom_prefix = document.getElementById('prefixInput');

    let _v_sha_ads = null, _v_sha_pref = null;
    let _last_saved_content = "", _last_saved_prefixes = "";
    let _is_loading = true;

    function setBtnState(state) {
        _dom_sv.classList.remove('visible', 'pill-gray-style', 'fast-flash');
        _dom_st.classList.remove('visible', 'pill-gray-style');
        _dom_sv.disabled = false;
        _dom_sv.style.color = "";
        _dom_st.style.color = "";

        switch(state) {
            case 'loading': 
                _dom_st.innerText = "ĐỒNG BỘ..."; 
                _dom_st.classList.add('visible', 'pill-gray-style'); 
                break;
            case 'saved': 
                _dom_sv.innerText = "ĐÃ LƯU"; 
                _dom_sv.disabled = true; 
                _dom_sv.classList.add('visible', 'pill-gray-style'); 
                break;
            case 'unsaved': 
                _dom_sv.innerText = "LƯU LẠI"; 
                _dom_sv.classList.add('visible'); 
                break;
            case 'saving': 
                _dom_sv.innerText = "LƯU LẠI...";
                _dom_sv.disabled = true; 
                _dom_sv.classList.add('visible', 'fast-flash');
                break;
            case 'offline':
                _dom_st.innerText = "MẤT KẾT NỐI"; 
                _dom_st.classList.add('visible', 'pill-gray-style'); 
                _dom_st.style.color = "var(--error-red)";
                _dom_sv.disabled = true;
                break;
            case 'error': 
                _dom_st.innerText = "LỖI XẢY RA"; 
                _dom_st.classList.add('visible', 'pill-gray-style'); 
                _dom_st.style.color = "var(--error-red)"; 
                break;
        }
    }

    function checkChanges() {
        if (!navigator.onLine) {
            setBtnState('offline');
            return;
        }
        if (_dom_ar.value !== _last_saved_content || _dom_prefix.value !== _last_saved_prefixes) setBtnState('unsaved');
        else setBtnState('saved');
    }

    function _remove_subdomain_prefixes(domain) {
        if (!domain) return "";
        let cleaned = domain.toLowerCase().trim();
        const activePrefixes = _dom_prefix.value.split(/\s+/).map(p => p.trim()).filter(p => p !== "" && p !== ".").sort((a, b) => b.length - a.length);
        let parts = cleaned.split('.');
        if (parts.length <= 2) return cleaned;
        let currentParts = [...parts];
        while (currentParts.length > 2) {
            let firstLabel = currentParts[0] + '.';
            if (activePrefixes.includes(firstLabel)) currentParts.shift();
            else break;
        }
        return currentParts.join('.');
    }

    function _is_valid_domain(str) {
        if (!str) return false;
        if (!str.includes('.') || str.startsWith('.') || str.endsWith('.')) return false;
        return /^[a-z0-9.-]+\.[a-z]{2,}$/i.test(str);
    }

    function _get_rules_only(rawInput) {
        return rawInput.split('\n').filter(line => {
            let l = line.trim();
            return !(l === "" || l.match(/! (Title|Description|Describe|Updated|Version|Blocked|Size|=======)/i) || l.startsWith("[Adblock") || l.startsWith('!') || l.startsWith('#') || l.startsWith('@'));
        }).join('\n');
    }

    function _format_kb_only(text) {
        const bytes = new TextEncoder().encode(text).length;
        const kb = bytes / 1024;
        return kb.toFixed(2) + "KB";
    }

    function _standardize_content(rawInput) {
        let rawLines = rawInput.split('\n');
        let bodyLines = [];
        let oldMeta = { u: "" };

        rawLines.forEach(line => {
            let l = line.trim();
            if (!l) return;
            const uMatch = l.match(/!\s*Updated:\s*(.+)/i);
            if (uMatch) oldMeta.u = uMatch[1];
            
            if (l.match(/! (Title|Description|Describe|Updated|Version|Blocked|Size|=======)/i) || l.startsWith("[Adblock") || l.startsWith('!')) return;
            
            // Ở bước lọc thô, giữ nguyên dòng gốc, không split bậy bạ để tránh làm mất context domain
            bodyLines.push(l);
        });

        let mergedMap = new Map();
        let otherRules = new Set();

        bodyLines.forEach(line => {
            // Regex chặt chẽ hơn: tìm domain và phần phân tách ##
            let hideMatch = line.match(/^([^#\[\]\s,]+)(##|#|\[|\.)(.*)$/);
            
            if (hideMatch && !line.startsWith('@@') && !line.startsWith('/') && !line.startsWith('.') && !line.startsWith('#')) {
                let rawDomain = hideMatch[1].trim();
                
                if (_is_valid_domain(rawDomain)) {
                    let domain = _remove_subdomain_prefixes(rawDomain);
                    let separator = hideMatch[2];
                    let selectorPart = hideMatch[3];
                    
                    // Khôi phục separator nếu là lỗi dán thiếu dấu ##
                    let fullSelector = (separator === '##' ? '' : separator) + selectorPart;
                    
                    if (!mergedMap.has(domain)) mergedMap.set(domain, new Set());
                    
                    // CHỈ Tách khi có dấu phẩy rõ ràng
                    // Không tách bằng khoảng trắng ở đây để giữ quan hệ cha con (a.com##.ad1 .ad2)
                    let selectors = fullSelector.split(/,(?![^\[]*\])/);
                    
                    selectors.forEach(s => {
                        let trimmed = s.trim();
                        if (trimmed) mergedMap.get(domain).add(trimmed);
                    });
                } else {
                    // Nếu không phải domain hợp lệ, coi như generic rule
                    otherRules.add(line);
                }
            } else {
                otherRules.add(line);
            }
        });

        let processedBody = [];
        mergedMap.forEach((selectors, domain) => {
            // Sắp xếp các selector của cùng 1 domain và nối bằng dấu phẩy
            processedBody.push(`${domain}##${Array.from(selectors).sort().join(',')}`);
        });

        otherRules.forEach(rule => {
            if (rule.trim()) processedBody.push(rule.trim());
        });

        const strictSort = (a, b) => a.localeCompare(b);
        let whitelistRules = Array.from(new Set(processedBody.filter(line => line.startsWith("@@||")))).sort(strictSort);
        let normalRules = Array.from(new Set(processedBody.filter(line => !line.startsWith("@@||") && line !== ""))).sort(strictSort);
        let uniqueBody = Array.from(new Set([...normalRules, ...whitelistRules]));

        const rulesForCounting = uniqueBody.filter(line => !line.startsWith('.') && !line.startsWith('##.'));
        const ruleCount = rulesForCounting.length;

        const isRulesChanged = _get_rules_only(_last_saved_content) !== uniqueBody.join('\n');
        let finalUpdateTime = oldMeta.u;
        if (isRulesChanged) {
            finalUpdateTime = new Date().toLocaleString('en-GB', { day: '2-digit', month: 'short', year: 'numeric', hour: '2-digit', minute: '2-digit', hour12: false }).replace(',', '');
        }

        let tempBodyOutput = [], lastGroupKey = "", lastDomainBase = "";
        uniqueBody.forEach(line => {
            let currentGroupKey = "";
            let currentDomainBase = "";

            if (line.startsWith("@@||")) {
                currentGroupKey = "WHITELIST";
                currentDomainBase = line.substring(4).split(/[\/\^]/)[0];
            } else if (/[a-zA-Z0-9]/.test(line[0])) {
                currentGroupKey = line[0].toUpperCase();
                currentDomainBase = line.split('##')[0];
            } else {
                currentGroupKey = "SPECIAL";
            }

            if (lastGroupKey && lastGroupKey !== currentGroupKey) {
                tempBodyOutput.push(""); 
            } else if (lastDomainBase && currentDomainBase && lastDomainBase !== currentDomainBase && currentGroupKey !== "SPECIAL") {
                tempBodyOutput.push("");
            }

            tempBodyOutput.push(line);
            lastGroupKey = currentGroupKey;
            lastDomainBase = currentDomainBase;
        });

        const dummyHeader = [
            "[Adblock Plus 2.0]", 
            "! Title: STOP ADS", 
            "! Describe: Chặn quảng cáo", 
            `! Updated: ${finalUpdateTime}`,
            `! Blocked: ${ruleCount}`,
            "! Size: -- KB",
            "! =================="
        ].join('\n');
        const finalSize = _format_kb_only(dummyHeader + "\n\n" + tempBodyOutput.join('\n'));

        const finalHeader = [
            "[Adblock Plus 2.0]", 
            "! Title: STOP ADS", 
            "! Describe: Chặn quảng cáo", 
            `! Updated: ${finalUpdateTime}`,
            `! Blocked: ${ruleCount}`,
            `! Size: ${finalSize}`,
            "! =================="
        ];
        
        return { content: [...finalHeader, "", ...tempBodyOutput].join('\n'), isRulesChanged: isRulesChanged };
    }

    async function _fetch_file(path) { return await fetch(`${_api_base}${path}`, { headers: { "Authorization": `Bearer ${_app_opt._k}` } }); }
    
    async function _load() {
        if (!navigator.onLine) {
            setBtnState('offline');
            return;
        }
        setBtnState('loading');
        try {
            const resAds = await _fetch_file(_app_opt._p_ads);
            if (resAds.ok) {
                const data = await resAds.json(); _v_sha_ads = data.sha;
                const dec = decodeURIComponent(atob(data.content).split('').map(c => '%' + ('00' + c.charCodeAt(0).toString(16)).slice(-2)).join(''));
                _dom_ar.value = _last_saved_content = dec;
            }
            const resPref = await _fetch_file(_app_opt._p_pref);
            if (resPref.ok) {
                const data = await resPref.json(); _v_sha_pref = data.sha;
                _dom_prefix.value = _last_saved_prefixes = formatPrefixesSmart(atob(data.content));
            }
            _is_loading = false; setBtnState('saved');
        } catch (e) { setBtnState('error'); }
    }

    async function _update_file(path, content, sha, message) {
        return await fetch(`${_api_base}${path}`, {
            method: "PUT",
            headers: { "Authorization": `Bearer ${_app_opt._k}`, "Content-Type": "application/json" },
            body: JSON.stringify({ message: message, content: btoa(String.fromCharCode(...new TextEncoder().encode(content))), sha: sha })
        });
    }

    window.addEventListener('online', () => { _load(); });
    window.addEventListener('offline', () => { setBtnState('offline'); });

    _dom_ar.addEventListener('input', () => { if (!_is_loading) checkChanges(); });
    _dom_prefix.addEventListener('blur', () => { if (!_is_loading) { _dom_prefix.value = formatPrefixesSmart(_dom_prefix.value); checkChanges(); } });
    _dom_prefix.addEventListener('input', () => { if (!_is_loading) checkChanges(); });

    _dom_sv.addEventListener('click', async () => {
        if (_dom_sv.disabled || !navigator.onLine) return;
        setBtnState('saving');
        try {
            const fPrefixes = formatPrefixesSmart(_dom_prefix.value);
            if (fPrefixes !== _last_saved_prefixes) {
                const res = await _update_file(_app_opt._p_pref, fPrefixes, _v_sha_pref, "update prefixes");
                if (res.ok) { _v_sha_pref = (await res.json()).content.sha; _last_saved_prefixes = _dom_prefix.value = fPrefixes; }
            }
            const result = _standardize_content(_dom_ar.value);
            const res = await _update_file(_app_opt._p_ads, result.content, _v_sha_ads, result.isRulesChanged ? `update filter` : "format rules");
            if (res.ok) { _v_sha_ads = (await res.json()).content.sha; _dom_ar.value = _last_saved_content = result.content; }
            setBtnState('saved');
        } catch (e) { setBtnState('error'); }
    });

    window.onload = _load;
})();
</script>
</body>
</html>
