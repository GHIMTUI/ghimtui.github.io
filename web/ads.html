<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Ads.txt Fullscreen Editor</title>
    <style>
        :root {
            /* Sử dụng dvh để tự động thích ứng với thanh công cụ trình duyệt */
            --app-height: 100vh; 
        }

        html, body {
            height: 100dvh; /* Ưu tiên dvh cho trình duyệt hiện đại */
            margin: 0;
            padding: 0;
            overflow: hidden;
            font-family: 'Segoe UI', system-ui, sans-serif;
            background-color: #1e1e1e;
            touch-action: pan-x pan-y;
        }

        .editor-container {
            display: flex;
            flex-direction: column;
            height: 100%;
            width: 100%;
            position: relative;
        }

        .toolbar {
            background-color: #2d2d2d;
            color: #ccc;
            padding: 0 15px;
            height: 60px;
            min-height: 60px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid #3c3c3c;
            z-index: 100;
            box-sizing: border-box;
        }

        .info-path {
            font-family: monospace;
            font-size: 13px;
            color: #9cdcfe;
            font-weight: bold;
            margin-right: 10px;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        button {
            background-color: #28a745;
            color: white;
            border: none;
            padding: 6px 10px;
            font-size: 14px;
            font-weight: bold;
            border-radius: 4px;
            cursor: pointer;
            transition: all 0.2s;
            white-space: normal;
            word-wrap: break-word;
            max-width: 120px; 
            line-height: 1.2;
            text-align: center;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
        }

        button:hover:not(:disabled) {
            filter: brightness(1.1);
        }

        button:disabled {
            background-color: #555;
            cursor: not-allowed;
            opacity: 0.7;
        }

        .textarea-wrapper {
            flex: 1;
            position: relative;
            overflow: hidden;
            background-color: #1e1e1e;
        }

        textarea {
            width: 100%;
            height: 100%;
            border: none;
            /* Thêm padding-bottom lớn để không bị che bởi thanh điều hướng khi cuộn xuống cuối */
            padding: 20px 20px 5px 20px;
            background-color: #1e1e1e;
            color: #d4d4d4;
            font-family: 'Consolas', 'Monaco', 'Courier New', monospace;
            font-size: 17px;
            line-height: 1.6;
            outline: none;
            resize: none;
            box-sizing: border-box;
            display: block;
            -webkit-overflow-scrolling: touch;
        }
    </style>
</head>
<body>

<div class="editor-container">
    <div class="toolbar">
        <div class="info-path">ADS.TXT MANAGER</div>
        <div class="actions">
            <button id="svBtn" disabled>LƯU LẠI</button>
        </div>
    </div>

    <div class="textarea-wrapper">
        <textarea id="txtAr" spellcheck="false" placeholder="Đang tải dữ liệu từ GitHub..."></textarea>
    </div>
</div>

<script>
(function() {
    // Ngăn chặn thu phóng bằng phím tắt
    document.addEventListener('keydown', function(e) {
        if (e.ctrlKey && (e.key === '=' || e.key === '-' || e.key === '0' || e.key === '+')) {
            e.preventDefault();
        }
    });

    document.addEventListener('wheel', function(e) {
        if (e.ctrlKey) e.preventDefault();
    }, { passive: false });

    // GitHub Config
    const _0x_u1 = ["Z2hwX3RLZzVQTFlk", "VlQweElPcko0R3VaSVU4S0M2V3BoTDNoUXhuZw=="];
    const _init_key = () => atob(_0x_u1[0] + _0x_u1[1]);

    const _app_opt = {
        _k: _init_key(),
        _o: "ghimtui",
        _r: "ghimtui.github.io",
        _p: "file/ads.txt"
    };

    const _ep_url = `https://api.github.com/repos/${_app_opt._o}/${_app_opt._r}/contents/${_app_opt._p}`;
    
    const _dom_ar = document.getElementById('txtAr');
    const _dom_sv = document.getElementById('svBtn');

    let _v_sha = null;
    let _original_rules_flat = ""; 

    function _get_clean_rules(content) {
    const bad_pfx = /\b(www\.|m\.|dev\.|staging\.|amp\.|api\.|s\.)/g;
    // Regex mới để loại bỏ || và @@|| ở đầu dòng
    const adblock_pfx = /^(\|\||@@\|\|)/; 
    
    let lines = content.split('\n');
    let grouped_rules = new Map();
    let other_rules = new Set();

    lines.forEach(line => {
        line = line.trim();
        // Bỏ qua dòng trống, comment (! hoặc #) và config [ ]
        if (!line || /^([\[!#])/.test(line)) return;

        const css_match = line.match(/^([^#]+)(##|#@#)(.+)$/);
        if (css_match) {
            let [_, doms, sep, sel] = css_match;
            let clean_doms = doms.split(',')
                .map(d => d.trim().replace(bad_pfx, '').replace(adblock_pfx, '')) // Xử lý cả || trong CSS domain
                .filter(d => d).sort().join(',');
            if (!clean_doms) return;
            
            let key = `${clean_doms}${sep}`;
            if (!grouped_rules.has(key)) grouped_rules.set(key, new Set());
            sel.split(',').forEach(s => {
                const clean_s = s.trim();
                if (clean_s) grouped_rules.get(key).add(clean_s);
            });
        } else {
            // Xử lý các dòng link/domain thông thường
            let record = line.replace(bad_pfx, '')
                             .replace(/,\s*\b(www\.|m\.|dev\.|staging\.|amp\.|api\.|s\.)/g, ', ');
            
            // Nếu bạn muốn đếm chính xác domain, có thể cân nhắc xóa adblock_pfx ở đây
            // Nhưng thông thường ads.txt của Adblock cần giữ || để có hiệu lực.
            // Nếu chỉ muốn đếm UNIQUE domain, hãy dùng: .replace(adblock_pfx, '')
            
            if (record) other_rules.add(record);
        }
    });

    let final_rules = [];
    grouped_rules.forEach((sels, key) => {
        if (sels.size > 0) final_rules.push(`${key}${Array.from(sels).sort().join(',')}`);
    });
    final_rules.push(...Array.from(other_rules));
    final_rules.sort();
    
    return final_rules;
}
    function _standardize_ads(content) {
        const final_rules = _get_clean_rules(content);
        const current_rules_flat = final_rules.join('\n');

        let old_version = "1.0.0";
        const v_match = content.match(/!\s*Version:\s*(\d+)\.(\d+)\.(\d+)/i);
        if (v_match) {
            old_version = `${v_match[1]}.${v_match[2]}.${v_match[3]}`;
        }

        let new_version = old_version;
        if (current_rules_flat !== _original_rules_flat) {
            if (v_match) {
                let major = parseInt(v_match[1], 10) || 0;
                let minor = parseInt(v_match[2], 10) || 0;
                let patch = parseInt(v_match[3], 10) || 0;
                new_version = `${major}.${minor}.${patch + 1}`;
            }
        }

        const now = new Date();
        const time_str = now.toLocaleString('en-GB', { 
            day: '2-digit', month: 'short', year: 'numeric', 
            hour: '2-digit', minute: '2-digit', hour12: false 
        }).replace(',', '');

        let output = [
            "[Adblock Plus 2.0]",
            "! Title: STOP ADS",
            "! Description: Chặn quảng cáo",
            `! Updated: ${time_str}`,
            `! Version: ${new_version}`,
            `! Blocked: ${final_rules.length}`,
            "! ==================",
            ""
        ];

        let last_char = null;
        final_rules.forEach(rule => {
            let first_char = rule[0].toLowerCase();
            if (!/[a-z0-9]/.test(first_char)) first_char = '#';
            if (last_char !== null && first_char !== last_char) output.push("");
            output.push(rule);
            last_char = first_char;
        });

        return { 
            content: output.join('\n'), 
            ruleCount: final_rules.length, 
            version: new_version,
            hasChanged: current_rules_flat !== _original_rules_flat
        };
    }

    async function _sync_down() {
        try {
            const _res = await fetch(_ep_url, {
                headers: { "Authorization": `Bearer ${_app_opt._k}`, "Accept": "application/vnd.github.v3+json" }
            });

            if (_res.ok) {
                const _data = await _res.json();
                _v_sha = _data.sha;
                const _raw = atob(_data.content);
                const _dec = decodeURIComponent(_raw.split('').map(c => 
                    '%' + ('00' + c.charCodeAt(0).toString(16)).slice(-2)
                ).join(''));
                
                _dom_ar.value = _dec;
                _original_rules_flat = _get_clean_rules(_dec).join('\n');
            } else {
                _dom_ar.value = "[Adblock Plus 2.0]\n! Version: 1.0.0";
                _original_rules_flat = "";
            }
            _dom_sv.disabled = false;
        } catch (err) {
            console.error("Lỗi đồng bộ");
        }
    }

    _dom_sv.addEventListener('click', async () => {
        const result = _standardize_ads(_dom_ar.value);
        _dom_ar.value = result.content;

        if (!result.hasChanged) {
            return;
        }

        _dom_sv.disabled = true;

        try {
            const _enc_u8 = new TextEncoder().encode(result.content);
            const _b64 = btoa(String.fromCharCode(..._enc_u8));
            
            const _res = await fetch(_ep_url, {
                method: "PUT",
                headers: {
                    "Authorization": `Bearer ${_app_opt._k}`,
                    "Content-Type": "application/json",
                    "Accept": "application/vnd.github.v3+json"
                },
                body: JSON.stringify({
                    message: `v${result.version} [${result.ruleCount} entries]`,
                    content: _b64,
                    sha: _v_sha 
                })
            });

            if (_res.ok) {
                const _res_data = await _res.json();
                _v_sha = _res_data.content.sha;
                _original_rules_flat = _get_clean_rules(result.content).join('\n');
            }
        } catch (err) {
            console.error("Lỗi hệ thống");
        } finally {
            _dom_sv.disabled = false;
        }
    });

    window.onload = _sync_down;
})();
</script>

</body>
</html>
