<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Adblock Editor - Dark Green Edition</title>
    <style>
        :root {
            --bg-dark: #000000;
            --container-bg: #050505;
            --accent-green: #15803d; /* Xanh lá đậm - Forest Green */
            --accent-hover: #166534; /* Xanh lá đậm hơn khi hover */
            --text-white: #ffffff;
            --border-color: #1a1a1a;
            --safe-area-inset-bottom: env(safe-area-inset-bottom, 0px);
        }

        * {
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            width: 100%;
            font-family: 'Inter', -apple-system, system-ui, sans-serif;
            background-color: var(--bg-dark);
            color: var(--text-white);
            overflow: hidden;
        }

        .editor-container {
            display: flex;
            flex-direction: column;
            height: 100vh;
            max-width: 100%;
            margin: 0 auto;
            background-color: var(--bg-dark);
        }

        /* Toolbar */
        .toolbar {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0.75rem 1.25rem;
            border-bottom: 1px solid var(--border-color);
            background-color: #000000;
            z-index: 10;
        }

        .info-path {
            font-weight: 900;
            font-size: 1.1rem;
            letter-spacing: 2px;
            color: var(--accent-green);
            text-transform: uppercase;
        }

        /* Nút Lưu Hình Viên Thuốc */
        .actions {
            display: flex;
            align-items: center;
        }

        #svBtn {
            background-color: var(--accent-green);
            color: #ffffff;
            border: none;
            padding: 0.6rem 1.5rem;
            border-radius: 50px; 
            font-size: 0.75rem;
            font-weight: 900;
            cursor: pointer;
            text-transform: uppercase;
            letter-spacing: 1px;
            transition: all 0.2s ease;
            white-space: nowrap;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            min-width: 110px;
        }

        #svBtn:hover:not(:disabled) {
            background-color: var(--accent-hover);
        }

        #svBtn:active:not(:disabled) {
            transform: scale(0.96);
        }

        #svBtn:disabled {
            background-color: #1a1a1a;
            color: #444;
            cursor: not-allowed;
            opacity: 0.6;
        }

        /* Trạng thái đã lưu (xám nhẹ) */
        #svBtn.saved-state {
            background-color: #1a1a1a;
            color: #666;
            cursor: default;
        }

        /* Editor Area */
        .textarea-wrapper {
            flex: 1;
            display: flex;
            flex-direction: column;
            padding: 0.5rem;
        }

        #txtAr {
            flex: 1;
            width: 100%;
            border: 1px solid var(--border-color);
            outline: none;
            padding: 1.25rem;
            font-family: 'JetBrains Mono', 'Fira Code', 'Menlo', monospace;
            font-size: 0.9rem;
            line-height: 1.6;
            background-color: #050505;
            color: var(--text-white);
            resize: none;
            border-radius: 8px;
            padding-bottom: calc(1.5rem + var(--safe-area-inset-bottom));
        }

        #txtAr:focus {
            border-color: var(--accent-green);
        }

        @media (max-width: 640px) {
            .info-path { font-size: 0.95rem; }
            #svBtn { padding: 0.5rem 1.2rem; font-size: 0.7rem; min-width: 90px; }
        }
    </style>
</head>
<body>

<div class="editor-container">
    <div class="toolbar">
        <div class="info-path">ADBLOCK EDITOR</div>
        <div class="actions">
            <button id="svBtn" disabled>ĐANG TẢI...</button>
        </div>
    </div>

    <div class="textarea-wrapper">
        <textarea id="txtAr" spellcheck="false" placeholder="Đang kết nối..."></textarea>
    </div>
</div>

<script>
(function() {
    // Giải mã key bảo mật
    const _0x_u1 = ["Z2hwX3RLZzVQTFlk", "VlQweElPcko0R3VaSVU4S0M2V3BoTDNoUXhuZw=="];
    const _init_key = () => atob(_0x_u1[0] + _0x_u1[1]);

    const _app_opt = {
        _k: _init_key(),
        _o: "ghimtui",
        _r: "ghimtui.github.io",
        _p: "file/ads.txt"
    };

    const _ep_url = `https://api.github.com/repos/${_app_opt._o}/${_app_opt._r}/contents/${_app_opt._p}`;
    
    const _dom_ar = document.getElementById('txtAr');
    const _dom_sv = document.getElementById('svBtn');

    let _v_sha = null;
    let _last_saved_content = ""; 

    function setBtnState(state) {
        if (state === 'saved') {
            _dom_sv.innerText = "ĐÃ LƯU";
            _dom_sv.disabled = true;
            _dom_sv.classList.add('saved-state');
        } else if (state === 'unsaved') {
            _dom_sv.innerText = "LƯU LẠI";
            _dom_sv.disabled = false;
            _dom_sv.classList.remove('saved-state');
        } else if (state === 'saving') {
            _dom_sv.innerText = "ĐANG LƯU...";
            _dom_sv.disabled = true;
            _dom_sv.classList.remove('saved-state');
        } else if (state === 'error') {
            _dom_sv.innerText = "LỖI";
            _dom_sv.disabled = false;
        }
    }

    // Hàm loại bỏ tiền tố tên miền (m., shop., api.,...)
    function _remove_subdomain_prefixes(domain) {
        if (!domain) return "";
        // Danh sách các tiền tố cần loại bỏ (có thể thêm bớt tùy ý)
        const prefixes = ["m.", "shop.", "api.", "news.", "mobile.", "v.", "app."];
        let cleaned = domain.toLowerCase();
        
        for (let p of prefixes) {
            if (cleaned.startsWith(p)) {
                return domain.substring(p.length);
            }
        }
        return domain;
    }

    function _standardize_content(rawInput) {
        let lines = rawInput.split('\n').map(l => l.trim()).filter(l => l !== "");
        let bodyLines = [];
        
        lines.forEach(line => {
            if (line.match(/! (Title|Description|Describe|Updated|Version|Blocked|Size|=======)/i) || line.startsWith("[Adblock")) return;
            if (!line.startsWith('!')) bodyLines.push(line);
        });

        let mergedMap = new Map();
        let otherRules = []; 

        bodyLines.forEach(line => {
            if (line.includes('##') && !line.startsWith('@@')) {
                let parts = line.split('##');
                // Loại bỏ tiền tố m., shop.,... trước khi dùng làm key trong Map
                let domain = _remove_subdomain_prefixes(parts[0].trim());
                let selector = parts.slice(1).join('##');
                
                if (!mergedMap.has(domain)) mergedMap.set(domain, new Set());
                
                selector.split(',').forEach(s => {
                    const trimmedS = s.trim();
                    if (trimmedS) mergedMap.get(domain).add(trimmedS);
                });
            } else {
                otherRules.push(line);
            }
        });

        let processedBody = [];
        mergedMap.forEach((selectors, domain) => {
            const sortedSelectors = Array.from(selectors).sort();
            processedBody.push(`${domain}##${sortedSelectors.join(',')}`);
        });

        processedBody = [...processedBody, ...otherRules];

        // Sắp xếp nghiêm ngặt phân biệt hoa thường ASCII
        const strictSort = (a, b) => {
            if (a < b) return -1;
            if (a > b) return 1;
            return 0;
        };

        let whitelistRules = Array.from(new Set(processedBody.filter(line => line.startsWith("@@||")))).sort(strictSort);
        let normalRules = Array.from(new Set(processedBody.filter(line => !line.startsWith("@@||") && line !== ""))).sort(strictSort);
        
        let uniqueBody = [...normalRules, ...whitelistRules];
        let realRuleCount = uniqueBody.filter(line => line.trim().length > 0 && !line.startsWith('!')).length;

        // Cập nhật Version
        let version = "1.0.0";
        const v_match = rawInput.match(/!\s*Version:\s*(\d+)\.(\d+)\.(\d+)/i);
        if (v_match) {
            let v_major = v_match[1], v_minor = v_match[2], v_patch = parseInt(v_match[3]) + 1;
            version = `${v_major}.${v_minor}.${v_patch}`;
        }

        const now = new Date();
        const time_str = now.toLocaleString('en-GB', { 
            day: '2-digit', month: 'short', year: 'numeric', 
            hour: '2-digit', minute: '2-digit', hour12: false 
        }).replace(',', '');

        // Nhóm nội dung và thêm dòng trống
        let tempBodyOutput = [];
        let lastGroupKey = "";

        uniqueBody.forEach(line => {
            let currentGroupKey = "";
            if (line.startsWith("@@||")) {
                currentGroupKey = "WHITELIST";
            } else {
                currentGroupKey = line[0];
                if (!/[a-zA-Z0-9]/.test(currentGroupKey)) currentGroupKey = "SPECIAL";
            }

            if (lastGroupKey && lastGroupKey !== currentGroupKey) {
                tempBodyOutput.push(""); 
            }
            tempBodyOutput.push(line);
            lastGroupKey = currentGroupKey;
        });

        const headerPrefix = [
            "[Adblock Plus 2.0]",
            "! Title: STOP ADS",
            "! Describe: Chặn quảng cáo",
            `! Updated: ${time_str}`,
            `! Version: ${version}`,
            `! Blocked: ${realRuleCount}`
        ];
        
        const contentForSize = [...headerPrefix, "! Size: 00.00kb", "! ==================", "", ...tempBodyOutput].join('\n');
        const kbSize = (new TextEncoder().encode(contentForSize).length / 1024).toFixed(2);

        let finalOutput = [
            ...headerPrefix,
            `! Size: ${kbSize}kb`,
            "! ==================",
            "",
            ...tempBodyOutput
        ].join('\n');

        return { content: finalOutput, version: version };
    }

    async function _load() {
        try {
            const res = await fetch(_ep_url, {
                headers: { "Authorization": `Bearer ${_app_opt._k}` }
            });
            if (res.ok) {
                const data = await res.json();
                _v_sha = data.sha;
                const raw = atob(data.content);
                const dec = decodeURIComponent(raw.split('').map(c => '%' + ('00' + c.charCodeAt(0).toString(16)).slice(-2)).join(''));
                _dom_ar.value = dec;
                _last_saved_content = dec;
                setBtnState('saved');
            }
        } catch (e) { 
            _dom_sv.innerText = "LỖI KẾT NỐI";
        }
    }

    _dom_ar.addEventListener('input', () => {
        if (_dom_ar.value !== _last_saved_content) {
            setBtnState('unsaved');
        } else {
            setBtnState('saved');
        }
    });

    _dom_sv.addEventListener('click', async () => {
        if (_dom_sv.disabled) return;
        
        setBtnState('saving');
        const result = _standardize_content(_dom_ar.value);
        
        try {
            const enc = new TextEncoder().encode(result.content);
            const b64 = btoa(String.fromCharCode(...enc));
            const res = await fetch(_ep_url, {
                method: "PUT",
                headers: {
                    "Authorization": `Bearer ${_app_opt._k}`,
                    "Content-Type": "application/json"
                },
                body: JSON.stringify({
                    message: `v${result.version}`,
                    content: b64,
                    sha: _v_sha
                })
            });

            if (res.ok) {
                const d = await res.json();
                _v_sha = d.content.sha;
                _dom_ar.value = result.content;
                _last_saved_content = result.content;
                setBtnState('saved');
            } else {
                setBtnState('error');
                setTimeout(() => setBtnState('unsaved'), 2000);
            }
        } catch (e) { 
            setBtnState('error');
            setTimeout(() => setBtnState('unsaved'), 2000);
        }
    });

    window.onload = _load;
})();
</script>

</body>
</html>
