name: Auto Update Filter Header

on:
  push:
    paths:
      - 'file/ads.txt' # Chạy khi file này bị thay đổi bởi JS của bạn

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Process Filter Header
        run: |
          FILE_PATH="file/ads.txt"
          
          # 1. Loại bỏ các dòng comment/header cũ (đề phòng)
          sed -i '/^[!\[]/d' $FILE_PATH
          sed -i '/^$/d' $FILE_PATH
          
          # 2. Tính toán các thông số
          COUNT=$(wc -l < $FILE_PATH)
          # Tính size theo KB (sử dụng bc để làm tròn 2 chữ số)
          BYTES=$(wc -c < $FILE_PATH)
          SIZE=$(echo "scale=2; $BYTES/1024" | bc)
          DATE=$(TZ='Asia/Ho_Chi_Minh' date '+%d %b %Y, %H:%M')

          # 3. Tạo file tạm chứa Header mới
          echo "[Adblock Plus 2.0]" > header.tmp
          echo "! Title: STOP ADS" >> header.tmp
          echo "! Describe: Chặn quảng cáo" >> header.tmp
          echo "! Updated: $DATE" >> header.tmp
          echo "! Blocked: $COUNT" >> header.tmp
          echo "! Size: $SIZE KB" >> header.tmp
          echo "! ==================" >> header.tmp
          echo "" >> header.tmp
          
          # 4. Gộp Header và Body cũ
          cat $FILE_PATH >> header.tmp
          mv header.tmp $FILE_PATH

      - name: Commit and Push changes
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add .
          git commit -m "Auto-update header [skip ci]" || echo "No changes to commit"
          git push
