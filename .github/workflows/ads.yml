name: Standardize ads.txt

on:
  push:
    paths:
      - 'file/ads.txt'
  workflow_dispatch:

jobs:
  format-ads:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout code
        uses: uses/checkout@v4

      - name: Process ads.txt
        shell: python
        run: |
          import re
          from pathlib import Path
          from collections import defaultdict
          from datetime import datetime, timedelta

          file_path = Path("file/ads.txt")
          if not file_path.exists():
              print("File not found, skipping...")
              exit(0)

          bad_pfx = r'\b(www\.|m\.|dev\.|staging\.|amp\.|api\.|s\.)'
          exclude_keywords = ["Block:", "Time:", "#tổng số", "#cập nhật", "Total rules:"]
          
          # 1. Xử lý thời gian GMT+7
          vn_time = datetime.utcnow() + timedelta(hours=7)
          current_time_str = vn_time.strftime("%d %b %Y %H:%M")

          lines = file_path.read_text(encoding='utf-8').splitlines()
          grouped_rules = defaultdict(set)
          other_rules = set()

          # 2. Phân loại dữ liệu
          for line in map(str.strip, lines):
              if not line or any(kw in line for kw in exclude_keywords) or line.startswith(('[', '#', '!')):
                  continue

              match = re.match(r'^([^#]+)(##|#@#)(.+)$', line)
              if match:
                  domains_str, separator, selector_str = match.groups()
                  clean_doms = {re.sub(bad_pfx, '', d.strip()) for d in domains_str.split(',')}
                  domain_key = ",".join(sorted(clean_doms))
                  new_selectors = {s.strip() for s in selector_str.split(',')}
                  grouped_rules[(domain_key, separator)].update(new_selectors)
              else:
                  record = re.sub(bad_pfx, '', line)
                  record = re.sub(r',\s*' + bad_pfx, ', ', record)
                  other_rules.add(record)

          # 3. Tổng hợp và Sắp xếp
          all_cleaned_rules = []
          for (doms, sep), selectors in grouped_rules.items():
              all_cleaned_rules.append(f"{doms}{sep}{','.join(sorted(selectors))}")
          all_cleaned_rules.extend(list(other_rules))
          all_cleaned_rules.sort()

          # 4. Chia nhóm 0-9, a-z bằng dòng trống
          body = []
          last_char = None
          for rule in all_cleaned_rules:
              if not rule: continue
              current_char = rule[0].lower()
              if last_char is not None and current_char != last_char:
                  body.append("") 
              body.append(rule)
              last_char = current_char

          # 5. Tạo Header với thống kê
          header = [
              "[Adblock Plus 2.0]",
              "! Title: STOP ADS",
              "! Description: Chặn quảng cáo",
              f"! Updated: {current_time_str} (GMT+7)",
              f"! Total rules: {len(all_cleaned_rules)}",
              "! Version: 1.0.0",
              "! ====================",
              ""
          ]

          file_path.write_text("\n".join(header + body), encoding='utf-8')

      - name: Commit and Push changes
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add file/ads.txt
          git diff --quiet && git diff --staged --quiet || (git commit -m "chore: update ads.txt (GMT+7 & grouping) [skip ci]" && git push)
