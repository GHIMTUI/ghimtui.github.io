name: Standardize ads.txt

on:
  push:
    paths:
      - 'file/ads.txt'
  workflow_dispatch:

jobs:
  format-ads:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Process ads.txt
        shell: python
        run: |
          import re
          from pathlib import Path
          from collections import defaultdict
          from datetime import datetime

          file_path = Path("file/ads.txt")
          if not file_path.exists():
              print("File not found, skipping...")
              exit(0)

          bad_pfx = r'\b(www\.|m\.|dev\.|staging\.|api\.|s\.)'
          exclude_keywords = ["Block:", "Time:", "#tổng số", "#cập nhật"]
          
          # Thiết lập Header cố định
          current_time = datetime.now().strftime("%d %b %Y %H:%M")
          formatted_headers = [
              "[Adblock Plus 2.0]",
              "! Title: STOP ADS",
              "! Description: chặn quảng cáo",
              f"! Updated: {current_time}",
              "! Version: 1.0.0"
          ]

          lines = file_path.read_text(encoding='utf-8').splitlines()
          grouped_rules, other_rules = defaultdict(set), set()

          for line in map(str.strip, lines):
              if not line: continue
              
              # Loại bỏ các dòng chứa từ khóa cũ
              if any(kw in line for kw in exclude_keywords):
                  continue
              
              # Bỏ qua các header cũ trong file để thay bằng header mới
              if line.startswith(('[', '#', '!')):
                  continue

              # Xử lý Rules
              match = re.match(r'^([^#]+)(##|#@#)(.+)$', line)
              if match:
                  domains_str, separator, selector_str = match.groups()
                  clean_doms = {re.sub(bad_pfx, '', d.strip()) for d in domains_str.split(',')}
                  domain_key = ",".join(sorted(clean_doms))
                  new_selectors = {s.strip() for s in selector_str.split(',')}
                  grouped_rules[(domain_key, separator)].update(new_selectors)
              else:
                  record = re.sub(bad_pfx, '', line)
                  record = re.sub(r',\s*' + bad_pfx, ', ', record)
                  other_rules.add(record)

          # Gộp kết quả
          formatted_grouped = [
              f"{doms}{sep}{', '.join(sorted(sels))}" 
              for (doms, sep), sels in grouped_rules.items()
          ]
          
          # Ghi file với Header mới + Dữ liệu đã xử lý
          final_content = "\n".join(formatted_headers + [""] + sorted(formatted_grouped) + sorted(other_rules))
          file_path.write_text(final_content, encoding='utf-8')

      - name: Commit and Push changes
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "Auto-format ads.txt: Standardize headers and cleanup"
          file_pattern: 'file/ads.txt'
