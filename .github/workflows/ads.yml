name: Standardize ads.txt

on:
  push:
    paths:
      - 'file/ads.txt'
  workflow_dispatch:

jobs:
  format-ads:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Process ads.txt
        shell: python
        run: |
          import re
          from pathlib import Path
          from collections import defaultdict
          from datetime import datetime

          file_path = Path("file/ads.txt")
          if not file_path.exists():
              print("File not found, skipping...")
              exit(0)

          bad_pfx = r'\b(www\.|m\.|dev\.|staging\.|api\.|s\.)'
          exclude_keywords = ["Block:", "Time:", "#tổng số", "#cập nhật"]
          
          # 1. Thiết lập Header cố định
          current_time = datetime.now().strftime("%d %b %Y %H:%M")
          final_output = [
              "[Adblock Plus 2.0]",
              "! Title: STOP ADS",
              "! Description: Chặn quảng cáo",
              f"! Updated: {current_time}",
              "! Version: 1.0.0",
              "! ====================",
              "" # Dòng trống sau header
          ]

          lines = file_path.read_text(encoding='utf-8').splitlines()
          grouped_rules = defaultdict(set)
          other_rules = set()

          # 2. Phân loại và làm sạch dữ liệu
          for line in map(str.strip, lines):
              if not line or any(kw in line for kw in exclude_keywords) or line.startswith(('[', '#', '!')):
                  continue

              match = re.match(r'^([^#]+)(##|#@#)(.+)$', line)
              if match:
                  domains_str, separator, selector_str = match.groups()
                  clean_doms = {re.sub(bad_pfx, '', d.strip()) for d in domains_str.split(',')}
                  domain_key = ",".join(sorted(clean_doms))
                  new_selectors = {s.strip() for s in selector_str.split(',')}
                  grouped_rules[(domain_key, separator)].update(new_selectors)
              else:
                  record = re.sub(bad_pfx, '', line)
                  record = re.sub(r',\s*' + bad_pfx, ', ', record)
                  other_rules.add(record)

          # 3. Gộp tất cả rules lại và sắp xếp
          all_final_rules = []
          for (doms, sep), sels in grouped_rules.items():
              all_final_rules.append(f"{doms}{sep}{', '.join(sorted(sels))}")
          all_final_rules.extend(list(other_rules))
          all_final_rules.sort()

          # 4. Phân nhóm theo ký tự đầu (0-9, a-z) và thêm dòng trống
          if all_final_rules:
              current_char = all_final_rules[0][0].lower()
              for rule in all_final_rules:
                  first_char = rule[0].lower()
                  if first_char != current_char:
                      final_output.append("") # Xuống dòng khi đổi nhóm ký tự
                      current_char = first_char
                  final_output.append(rule)

          # 5. Ghi file
          file_path.write_text("\n".join(final_output), encoding='utf-8')

      - name: Commit and Push changes
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "Auto-format ads.txt: Grouped by 0-9, a-z"
          file_pattern: 'file/ads.txt'
