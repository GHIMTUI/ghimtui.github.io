name: Standardize ads.txt

on:
  push:
    paths:
      - 'file/ads.txt'
  workflow_dispatch:

jobs:
  format-ads:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Process ads.txt
        shell: python
        run: |
          import re
          import hashlib
          from pathlib import Path
          from collections import defaultdict
          from datetime import datetime, timedelta, timezone

          file_path = Path("file/ads.txt")
          if not file_path.exists():
              print("File not found, skipping...")
              exit(0)

          # 1. Đọc nội dung cũ và lấy Version hiện tại
          content = file_path.read_text(encoding='utf-8')
          
          # Tìm version cũ để tăng tiến
          version_match = re.search(r'! Version:\s*(\d+)\.(\d+)\.(\d+)', content)
          if version_match:
              major, minor, patch = map(int, version_match.groups())
              new_version = f"{major}.{minor}.{patch + 1}"
          else:
              new_version = "1.0.0"

          # 2. Cấu hình thời gian
          tz_hcm = timezone(timedelta(hours=7))
          current_time = datetime.now(tz_hcm).strftime("%d %b %Y %H:%M")
          
          # Regex lọc prefix domain không cần thiết
          bad_pfx = r'\b(www\.|m\.|dev\.|staging\.|amp\.|api\.|s\.)'
          
          lines = content.splitlines()
          grouped_rules = defaultdict(set)
          other_rules = set()

          for line in map(str.strip, lines):
              # BỎ QUA: dòng trống, dòng header bắt đầu bằng [ hoặc ! hoặc #
              # Đã loại bỏ phần check exclude_keywords theo yêu cầu
              if not line or line.startswith(('[', '!', '#')):
                  continue

              # Xử lý quy tắc ẩn phần tử (CSS Selectors: ## hoặc #@#)
              match = re.match(r'^([^#]+)(##|#@#)(.+)$', line)
              if match:
                  domains_str, separator, selector_str = match.groups()
                  # Làm sạch domains
                  clean_doms = {re.sub(bad_pfx, '', d.strip()) for d in domains_str.split(',')}
                  domain_key = ",".join(sorted(clean_doms))
                  # Gom nhóm selectors
                  new_selectors = {s.strip() for s in selector_str.split(',')}
                  grouped_rules[(domain_key, separator)].update(new_selectors)
              else:
                  # Xử lý quy tắc chặn request thông thường
                  record = re.sub(bad_pfx, '', line)
                  record = re.sub(r',\s*' + bad_pfx, ', ', record)
                  other_rules.add(record)

          # 3. Tổng hợp và sắp xếp
          all_final_rules = []
          for (doms, sep), selectors in grouped_rules.items():
              all_final_rules.append(f"{doms}{sep}{','.join(sorted(selectors))}")
          
          all_final_rules.extend(list(other_rules))
          all_final_rules.sort()

          # 4. Tính toán Checksum (chỉ dựa trên nội dung các rules)
          rules_text = "\n".join(all_final_rules)
          checksum_val = hashlib.md5(rules_text.encode('utf-8')).hexdigest()[:12]

          # 5. Xây dựng nội dung file mới với Header chuẩn Adblock Plus
          final_output = [
              "[Adblock Plus 2.0]",
              "! Title: STOP ADS",
              "! Description: Chặn quảng cáo",
              f"! Updated: {current_time}",
              f"! Version: {new_version}",
              f"! Checksum: {checksum_val}",
              "! ==================",
              "" 
          ]

          # Phân đoạn nội dung theo chữ cái đầu (A-Z) để dễ nhìn
          last_char = None
          for rule in all_final_rules:
              first_char = rule[0].lower()
              if not first_char.isalnum(): first_char = '#'
              
              if last_char is not None and first_char != last_char:
                  final_output.append("") # Thêm dòng trống giữa các nhóm chữ cái
              
              final_output.append(rule)
              last_char = first_char

          # 6. Ghi đè lại file
          file_path.write_text("\n".join(final_output), encoding='utf-8')

      - name: Commit and Push changes
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add file/ads.txt
          # Lấy version mới để tạo commit message
          NEW_VER=$(grep '! Version:' file/ads.txt | cut -d' ' -f3)
          git commit -m "chore: update ads.txt to version $NEW_VER [skip ci]" || echo "No changes to commit"
          git push
