name: Standardize ads.txt

on:
  push:
    paths:
      - 'file/ads.txt'
  workflow_dispatch:

jobs:
  format-ads:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Process ads.txt
        shell: python
        run: |
          import re
          from pathlib import Path
          from collections import defaultdict
          from datetime import datetime, timedelta

          file_path = Path("file/ads.txt")
          if not file_path.exists():
              print("File not found, skipping...")
              exit(0)

          # Regex tìm các prefix không mong muốn
          bad_pfx = r'\b(www\.|m\.|dev\.|staging\.|api\.)'
          
          lines = file_path.read_text(encoding='utf-8').splitlines()
          headers, grouped_rules, other_rules = [], defaultdict(set), set()

          for line in map(str.strip, lines):
              if not line: continue
              
              # Loại bỏ dòng thống kê cũ có chứa Block: hoặc Time:
              if any(x in line for x in ["Block:", "Time:"]):
                  continue
              
              # Loại bỏ các dòng comment cụ thể: #tổng số và #cập nhật
              if any(tag in line for tag in ["#tổng số", "#cập nhật"]):
                  continue

              # Xử lý Header (Bắt đầu bằng [, #, !)
              if line.startswith(('[', '#', '!')):
                  headers.append(line)
                  continue

              # Xử lý Cosmetic Filter (có ## hoặc #@#)
              match = re.match(r'^([^#]+)(##|#@#)(.+)$', line)
              if match:
                  domains_str, separator, selector_str = match.groups()
                  clean_doms = {re.sub(bad_pfx, '', d.strip()) for d in domains_str.split(',')}
                  domain_key = ",".join(sorted(clean_doms))
                  new_selectors = {s.strip() for s in selector_str.split(',')}
                  grouped_rules[(domain_key, separator)].update(new_selectors)
              else:
                  # Xử lý các quy tắc chặn mạng thông thường
                  record = re.sub(bad_pfx, '', line)
                  record = re.sub(r',\s*' + bad_pfx, ', ', record)
                  other_rules.add(record)

          # Gộp các group lại thành list chuỗi
          formatted_grouped = [
              f"{doms}{sep}{', '.join(sorted(sels))}" 
              for (doms, sep), sels in grouped_rules.items()
          ]
          
          def sort_logic(s):
              s_low = s.lower()
              if s_low.startswith('@@||'): return '{~~}' + s_low
              if s_low.startswith('||'): return '{~}' + s_low
              return s_low

          all_ads = sorted(formatted_grouped + list(other_rules), key=sort_logic)

          # --- TẠO THỐNG KÊ MỚI ---
          count = len(all_ads)
          # UTC+7 cho Việt Nam
          now_vn = datetime.utcnow() + timedelta(hours=7)
          day = now_vn.strftime("%d").lstrip('0')
          time_formatted = f"{day} {now_vn.strftime('%b %Y %H:%M')}"
          
          stats = [
              f"!Block: {count} page",
              f"!Time: {time_formatted}"
          ]

          organized_ads, last_group = [], None
          for line in all_ads:
              if line.startswith('@@||'):
                  current_group = 'EXCLUDE'
              elif line.startswith('||'):
                  current_group = 'BLOCK'
              else:
                  current_group = line[0].lower()

              if last_group is not None and last_group != current_group:
                  organized_ads.append('')
              
              organized_ads.append(line)
              last_group = current_group

          # Hợp nhất: Thống kê -> Header -> Body
          final_content = stats + ([''] if headers else []) + headers + ([''] if organized_ads else []) + organized_ads
          
          file_path.write_text('\n'.join(final_content).strip() + '\n', encoding='utf-8')

      - name: Commit and Push changes
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "Auto-format: Remove redundant hashtags and update stats"
          file_pattern: 'file/ads.txt'
