name: Check TV Channels Signal

on:
  schedule:
    - cron: '0 17 * * *' # 0h sáng giờ VN
  workflow_dispatch:

jobs:
  check-signal:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5

    - name: Install FFmpeg
      run: |
        sudo apt-get update
        sudo apt-get install -y ffmpeg

    - name: Scan Channels
      run: |
        python - << 'EOF'
        import os
        import subprocess
        import re
        from datetime import datetime

        file_path = "tivi.mkv"
        log_path = "tivi_scan.txt"
        current_time = datetime.now().strftime("%Y-%m-%d %H:%M:%S")

        if not os.path.exists(file_path):
            print("Không tìm thấy file tivi.mkv")
            exit(1)

        # Đọc danh sách link từ file tivi.mkv
        with open(file_path, "r", encoding="utf-8", errors="ignore") as f:
            content = f.read()

        # Dùng Regex để tìm tất cả các link (http/https/rtmp...) có trong file
        links = re.findall(r'(https?://[^\s"\'>]+|rtmp://[^\s"\'>]+)', content)

        good_channels = []
        good_channels.append(f"=== KÊNH CÓ TÍN HIỆU ({current_time}) ===")

        print(f"Tìm thấy {len(links)} link kênh. Bắt đầu quét...")

        for link in links:
            # Test nhanh từng link trong 2 giây
            cmd = ["ffmpeg", "-v", "error", "-t", "2", "-i", link, "-f", "null", "-"]
            result = subprocess.run(cmd, stderr=subprocess.PIPE, stdout=subprocess.PIPE, text=True)
            
            if result.returncode == 0:
                # Kênh SỐNG -> Lưu lại
                good_channels.append(f"✅ SỐNG: {link}")
            else:
                # Kênh CHẾT (Không tín hiệu) -> BỎ QUA, KHÔNG BÁO đúng ý bạn!
                pass

        good_channels.append("=========================================\n")

        # Ghi danh sách các kênh SỐNG vào file tivi_scan.txt
        with open(log_path, "w", encoding="utf-8") as log_file:
            log_file.write("\n".join(good_channels))

        print("Quét xong! Đã lọc các kênh sống vào tivi_scan.txt")
        EOF

    - name: Commit and Push tivi_scan.txt
      run: |
        git config --local user.email "action@github.com"
        git config --local user.name "GitHub Action"
        git add tivi_scan.txt
        git diff-index --quiet HEAD || git commit -m "Cập nhật kênh sống [skip ci]"
        git push
