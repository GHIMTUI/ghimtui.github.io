name: Tự động tách link gốc SCTV

on:
  schedule:
    - cron: '0 */2 * * *' # Chạy 2 tiếng 1 lần
  workflow_dispatch: # Cho phép bấm chạy bằng tay

jobs:
  update-link:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Thiết lập Python
      uses: actions/setup-python@v5
      with:
        python-cache-dependency-path: ''

    - name: Bóc tách link gốc và lưu vào file
      run: |
        python -c "
        import urllib.request
        import re

        try:
            url = 'http://hoiquan.dpdns.org/VTVGo/?sctv5'
            
            # Thêm Headers giả lập trình duyệt Chrome để tránh lỗi 403 Forbidden
            headers = {
                'User-Agent': 'Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/120.0.0.0 Safari/537.36',
                'Accept': 'text/html,application/xhtml+xml,application/xml;q=0.9,image/webp,*/*;q=0.8',
                'Accept-Language': 'vi,en-US;q=0.7,en;q=0.3',
                'Referer': 'https://www.google.com/'
            }
            
            req = urllib.request.Request(url, headers=headers)
            html = urllib.request.urlopen(req).read().decode('utf-8')

            # Tìm tất cả các link (đuôi m3u8, mp4 hoặc link bất kỳ) bên trong HTML
            links = re.findall(r'(https?://[^\s\"\'<>]+)', html)
            
            if links:
                # Lọc bỏ chính cái link vỏ hoiquan.dpdns.org nếu nó nằm trong nội dung kết quả
                real_links = [l for l in links if 'hoiquan.dpdns.org' not in l]
                
                if real_links:
                    # Lấy link gốc đầu tiên tìm thấy
                    origin_link = real_links[0]
                    
                    # Ghi đè vào file link_sctv.txt
                    with open('link_sctv.txt', 'w') as f:
                        f.write(origin_link.strip())
                    print(f'Thành công! Đã lưu link gốc: {origin_link}')
                else:
                    print('Không tìm thấy link gốc nào khác ngoài link vỏ.')
            else:
                print('Không tìm thấy chuỗi link nào trong nội dung phản hồi.')
                
        except Exception as e:
            print(f'Lỗi khi cào dữ liệu: {e}')
            # Nếu vẫn lỗi, xuất toàn bộ lỗi ra để kiểm tra
            raise e
        "

    - name: Commit và Push nếu có thay đổi
      run: |
        git config --local user.email "github-actions[bot]@users.noreply.github.com"
        git config --local user.name "github-actions[bot]"
        git add link_sctv.txt
        if ! git diff --cached --quiet; then
          git commit -m "Auto-update link_sctv.txt ($(date +'%Y-%m-%d %H:%M:%S'))"
          git push
        else
          echo "Link không có thay đổi, bỏ qua commit."
        fi
