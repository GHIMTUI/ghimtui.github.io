name: Tự động tách link gốc SCTV

on:
  schedule:
    - cron: '0 */2 * * *' # Chạy 2 tiếng 1 lần
  workflow_dispatch: # Cho phép bấm chạy bằng tay

jobs:
  update-link:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Thiết lập Python
      uses: actions/setup-python@v5
      with:
        python-cache-dependency-path: '' # Bỏ qua cache để chạy nhanh hơn

    - name: Bóc tách link gốc và lưu vào file
      run: |
        python -c "
        import urllib.request
        import re

        try:
            # 1. Tải nội dung từ trang vỏ
            url = 'http://hoiquan.dpdns.org/VTVGo/?sctv5'
            req = urllib.request.Request(url, headers={'User-Agent': 'Mozilla/5.0'})
            html = urllib.request.urlopen(req).read().decode('utf-8')

            # 2. Tìm tất cả các link (ví dụ link .m3u8 hoặc link bất kỳ) bên trong HTML
            # Tìm các chuỗi bắt đầu bằng http/https và không chứa dấu nháy hoặc khoảng trắng
            links = re.findall(r'(https?://[^\s\"\'<>]+)', html)
            
            if links:
                # Lọc bỏ chính cái link vỏ nếu nó xuất hiện trong nội dung
                real_links = [l for l in links if 'hoiquan.dpdns.org' not in l]
                
                if real_links:
                    # Lấy link đầu tiên tìm được
                    origin_link = real_links[0]
                    
                    # 3. Ghi đè vào file link_sctv.txt
                    with open('link_sctv.txt', 'w') as f:
                        f.write(origin_link.strip())
                    print(f'Đã tìm thấy và lưu link gốc: {origin_link}')
                else:
                    print('Không tìm thấy link gốc hợp lệ nào khác ngoài link vỏ.')
            else:
                print('Không tìm thấy bất kỳ link nào trong nội dung.')
        except Exception as e:
            print(f'Lỗi khi xử lý: {e}')
        "

    - name: Commit và Push nếu có thay đổi
      run: |
        git config --local user.email "github-actions[bot]@users.noreply.github.com"
        git config --local user.name "github-actions[bot]"
        git add link_sctv.txt
        if ! git diff --cached --quiet; then
          git commit -m "Auto-update link_sctv.txt ($(date +'%Y-%m-%d %H:%M:%S'))"
          git push
        else
          echo "Link không có thay đổi, bỏ qua commit."
        fi
