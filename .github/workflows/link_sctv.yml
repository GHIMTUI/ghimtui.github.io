name: Tự động cập nhật Link SCTV gốc

on:
  schedule:
    - cron: '0 */2 * * *' # Tự động chạy mỗi 2 tiếng một lần
  workflow_dispatch: # Cho phép bấm chạy bằng tay

permissions:
  contents: write

jobs:
  update-link:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Bóc tách link gốc m3u8
      run: |
        echo "=== PHƯƠNG PHÁP 1: TẢI TRỰC TIẾP GIẢ LẬP TRÌNH DUYỆT ==="
        curl -s -A "Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/125.0.0.0 Safari/537.36" \
             -H "Accept: text/html,application/xhtml+xml,application/xml;q=0.9,image/avif,image/webp,*/*;q=0.8" \
             -H "Accept-Language: vi-VN,vi;q=0.9,en-US;q=0.8,en;q=0.7" \
             "http://hoiquan.dpdns.org/VTVGo/?sctv1" > raw.txt

        # Nếu không thấy chữ m3u8 trong file raw.txt, chuyển sang Proxy 1
        if ! grep -q "m3u8" raw.txt; then
          echo "⚠️ Phương pháp 1 bị chặn IP. Đang chuyển sang Phương pháp 2 (Corsproxy)..."
          curl -s "https://corsproxy.io/?http://hoiquan.dpdns.org/VTVGo/?sctv1" > raw.txt
        fi

        # Nếu vẫn chưa thấy m3u8, chuyển sang Proxy 2 dự phòng
        if ! grep -q "m3u8" raw.txt; then
          echo "⚠️ Phương pháp 2 thất bại. Đang chuyển sang Phương pháp 3 (Allorigins)..."
          curl -s "https://api.allorigins.win/raw?url=http://hoiquan.dpdns.org/VTVGo/?sctv1" > raw.txt
        fi

        # CHÍNH XÁC Ở ĐÂY: Chỉ lọc dòng nào có chứa chữ 'm3u8' để lấy đúng link xem TV
        grep 'm3u8' raw.txt | tr -d '\r' | head -n 1 | xargs > link_sctv.txt || true

        # Kiểm tra xem file xuất ra có trống không
        if [ ! -s link_sctv.txt ] || [ "$(cat link_sctv.txt)" = "" ]; then
          echo "❌ THẤT BẠI: Không tìm thấy hoặc không bóc tách được dòng chứa link m3u8!"
          cat raw.txt
          exit 1
        fi

        echo "✅ THÀNH CÔNG! Đường dẫn m3u8 đã được bóc tách:"
        cat link_sctv.txt

    - name: Commit và Push nếu có thay đổi
      run: |
        git config --local user.email "github-actions[bot]@users.noreply.github.com"
        git config --local user.name "github-actions[bot]"
        
        git add link_sctv.txt
        
        if ! git diff --cached --quiet; then
          git commit -m "Auto-update link_sctv.txt ($(date +'%Y-%m-%d %H:%M:%S'))"
          git push
        else
          echo "Link giống hệt bản cũ, bỏ qua commit."
        fi
