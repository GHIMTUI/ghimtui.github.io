name: Tự động cập nhật Link SCTV

on:
  schedule:
    # Chạy mỗi 2 giờ một lần
    - cron: '0 */2 * * *'
  
  # Cho phép bấm chạy thủ công bằng tay
  workflow_dispatch:

jobs:
  update-link:
    runs-on: ubuntu-latest

    steps:
    # Bước 1: Checkout mã nguồn về máy ảo
    - name: Checkout repository
      uses: actions/checkout@v4

    # Bước 2: Tải nội dung link thô và giả lập trình duyệt để tránh lỗi 403
    - name: Tải link gốc và lưu vào file
      run: |
        curl -s -H "User-Agent: Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/120.0.0.0 Safari/537.36" \
             -H "Accept: text/plain,text/html" \
             "http://hoiquan.dpdns.org/VTVGo/?sctv5" > link_sctv.txt

    # Bước 3: Kiểm tra xem link mới có khác link cũ không, nếu khác thì mới push
    - name: Commit và Push nếu có thay đổi
      run: |
        git config --local user.email "github-actions[bot]@users.noreply.github.com"
        git config --local user.name "github-actions[bot]"
        
        git add link_sctv.txt
        
        if ! git diff --cached --quiet; then
          git commit -m "Auto-update link_sctv.txt ($(date +'%Y-%m-%d %H:%M:%S'))"
          git push
        else
          echo "Link không có thay đổi so với phiên bản trước, bỏ qua commit."
        fi
