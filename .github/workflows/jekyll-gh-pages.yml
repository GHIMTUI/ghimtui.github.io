# Quy trình đơn giản để dựng và triển khai trang Jekyll lên GitHub Pages
name: Triển khai Jekyll tích hợp sẵn các gói phụ thuộc GitHub Pages

on:
  # Chạy khi có push vào nhánh mặc định
  push:
    branches: ["main"]

  # Cho phép kích hoạt quy trình thủ công từ tab Actions
  workflow_dispatch:

# Cấp quyền cho GITHUB_TOKEN để triển khai lên GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

# Chỉ cho phép một lượt triển khai chạy tại một thời điểm, bỏ qua các lượt đang chờ.
# Không hủy lượt đang chạy để đảm bảo quá trình triển khai hoàn tất.
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  # Job biên dịch (Build)
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Kiểm tra mã nguồn
        uses: actions/checkout@v4
      - name: Thiết lập Pages
        uses: actions/configure-pages@v5
      - name: Dựng trang bằng Jekyll
        uses: actions/jekyll-build-pages@v1
        with:
          source: ./
          destination: ./_site
      - name: Tải lên artifact
        uses: actions/upload-pages-artifact@v3

  # Job triển khai (Deploy)
  deploy:
    environment:
      name: github pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Triển khai lên GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
