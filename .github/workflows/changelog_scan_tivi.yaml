name: Check TV Channels Signal (Fast Mode)

on:
  schedule:
    - cron: '0 17 * * *' # 0h sáng giờ VN
  workflow_dispatch:

jobs:
  check-signal:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5

    - name: Setup FFmpeg Fast
      uses: federicocarboni/setup-ffmpeg@v3
      with:
        token: ${{ secrets.GITHUB_TOKEN }}

    - name: Scan Channels Parallel
      run: |
        python - << 'EOF'
        import os
        import subprocess
        import re
        import sys
        from datetime import datetime
        from concurrent.futures import ThreadPoolExecutor, as_completed

        file_path = "tivi.mkv"
        log_path = "changelog_scan_tivi.txt"
        current_time = datetime.now().strftime("%Y-%m-%d %H:%M:%S")

        if not os.path.exists(file_path):
            print("Không tìm thấy file tivi.mkv")
            sys.exit(1)

        with open(file_path, "r", encoding="utf-8", errors="ignore") as f:
            content = f.read()

        links = re.findall(r'(https?://[^\s"\'>]+|rtmp://[^\s"\'>]+)', content)
        links = list(set(links)) 

        total_links = len(links)
        print(f"🚀 Tìm thấy {total_links} link độc nhất. Bắt đầu quét song song...")

        good_channels = []

        def check_single_link(link):
            cmd = ["ffmpeg", "-v", "error", "-rw_timeout", "3000000", "-t", "1", "-i", link, "-f", "null", "-"]
            result = subprocess.run(cmd, stderr=subprocess.PIPE, stdout=subprocess.PIPE, text=True)
            if result.returncode == 0:
                return link
            return None

        with ThreadPoolExecutor(max_workers=15) as executor:
            futures = {executor.submit(check_single_link, link): link for link in links}
            
            for future in as_completed(futures):
                res = future.result()
                if res:
                    print(f"✅ SỐNG: {res}")
                    good_channels.append(f"✅ SỐNG: {res}")

        good_channels.sort()
        
        # --- Đoạn xử lý logic ghi log thông minh ---
        log_output = [f"=== KÊNH CÓ TÍN HIỆU ({current_time}) ==="]
        
        if total_links == 0:
            log_output.append("⚠️ Không tìm thấy link kênh tịvi để quét.")
        elif len(good_channels) == total_links:
            log_output.append(f"☑️ Tổng {total_links}/{total_links} kênh có tín hiệu.")
            log_output.extend(good_channels)
        elif len(good_channels) == 0:
            log_output.append("❌ Toàn bộ kênh mất tín hiệu!")
        else:
            log_output.append(f"📊 Kết quả: {len(good_channels)}/{total_links} kênh hoạt động tốt.")
            log_output.extend(good_channels)
            
        log_output.append("=========================================\n")
        
        # Ghi nội dung vào file log
        with open(log_path, "w", encoding="utf-8") as log_file:
            log_file.write("\n".join(log_output))

        print(f"🏁 Đã quét xong siêu tốc! Kết quả lưu tại {log_path}")
        EOF

    - name: Commit and Push changelog_scan_tivi.txt
      run: |
        git config --local user.email "action@github.com"
        git config --local user.name "GitHub Action"
        git add changelog_scan_tivi.txt
        git diff-index --quiet HEAD || git commit -m "Cập nhật quét kênh siêu tốc [skip ci]"
        git push
