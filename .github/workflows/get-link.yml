name: Get Original SCTV Link

on:
  schedule:
    - cron: '0 0 * * *' # Chạy tự động mỗi ngày
  workflow_dispatch: # Cho phép nhấn chạy thủ công

jobs:
  fetch-link:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Fetch original URL from content
      run: |
        PROXY_URL="http://hoiquan.dpdns.org/VTVGo/?sctv3"
        
        # Tải nội dung text bên trong link proxy (đây chính là link gốc)
        ORIGINAL_URL=$(curl -s "$PROXY_URL")
        
        # Loại bỏ các khoảng trắng hoặc ký tự xuống dòng thừa nếu có
        ORIGINAL_URL=$(echo "$ORIGINAL_URL" | xargs)
        
        echo "Link gốc lấy được: $ORIGINAL_URL"
        
        # Ghi đè link gốc vào file link-sctv.txt
        echo "$ORIGINAL_URL" > link-sctv.txt

    - name: Commit and Push changes
      run: |
        git config --global user.name "github-actions[bot]"
        git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
        
        git add link-sctv.txt
        
        if git diff --staged --quiet; then
          echo "Không có thay đổi, giữ nguyên."
        else
          git commit -m "Auto-update: Cập nhật link gốc SCTV"
          git push
        fi
