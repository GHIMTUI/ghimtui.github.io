# Quy trình đơn giản để triển khai nội dung tĩnh lên GitHub Pages
name: Triển khai nội dung tĩnh lên Pages

on:
  # Chạy khi có push vào nhánh mặc định
  push:
    branches: ["main"]

  # Cho phép kích hoạt quy trình thủ công từ tab Actions
  workflow_dispatch:

# Cấp quyền cho GITHUB_TOKEN để triển khai lên GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

# Chỉ cho phép một lượt triển khai chạy tại một thời điểm, bỏ qua các lượt đang chờ.
# Không hủy lượt đang chạy để đảm bảo quá trình triển khai hoàn tất.
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  # Chỉ gồm một job triển khai duy nhất
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Kiểm tra mã nguồn
        uses: actions/checkout@v4
      - name: Thiết lập Pages
        uses: actions/configure-pages@v5
      - name: Tải lên artifact
        uses: actions/upload-pages-artifact@v3
        with:
          # Tải lên toàn bộ kho chứa (repository)
          path: '.'
      - name: Triển khai lên GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
