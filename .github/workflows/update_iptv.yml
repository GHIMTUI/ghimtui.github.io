name: Extract IPTV Link to Text File With M3U8 Extension

on:
  schedule:
    - cron: '0 */2 * * *' # Tự động chạy mỗi 2 tiếng một lần
  workflow_dispatch: # Nút bấm để bạn tự kích hoạt chạy bằng tay bất cứ lúc nào

jobs:
  extract-link:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: 20

    - name: Run JavaScript Extract Link
      run: |
        node -e '
        const http = require("http");
        const fs = require("fs");

        const targetUrl = "http://hoiquan.dpdns.org/VTVGo/?sctv4";

        function extractRealLink(url) {
            http.get(url, {
                headers: { 
                    // User-Agent di động do bạn cung cấp
                    "User-Agent": "Mozilla/5.0 (Linux; Android 10; K) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/119.0.0.0 Mobile Safari/537.36",
                    // Thêm các Header để phá lỗi 403 Forbidden
                    "Referer": "http://hoiquan.dpdns.org/",
                    "Origin": "http://hoiquan.dpdns.org",
                    "Accept": "text/html,application/xhtml+xml,application/xml;q=0.9,image/webp,image/apng,*/*;q=0.8",
                    "Accept-Language": "vi-VN,vi;q=0.9,en-US;q=0.8,en;q=0.7",
                    "Connection": "keep-alive"
                }
            }, (res) => {
                // Kiểm tra các mã trạng thái chuyển hướng
                if ([301, 302, 307].includes(res.statusCode) && res.headers.location) {
                    let realUrl = res.headers.location.trim();
                    
                    // Kiểm tra và ép đuôi .m3u8 ở cuối chuỗi
                    if (!realUrl.endsWith(".m3u8")) {
                        if (realUrl.includes("?")) {
                            realUrl = realUrl + "&file=.m3u8";
                        } else {
                            realUrl = realUrl + "?file=.m3u8";
                        }
                    }
                    
                    // Ghi đè vào file link_sctv.txt
                    fs.writeFileSync("link_sctv.txt", realUrl);
                    console.log("=== BÓC TÁCH THÀNH CÔNG ===");
                    console.log("Link thật thu được: " + realUrl);
                } else {
                    console.log("=== LỖI PHẢN HỒI ===");
                    console.log("Mã lỗi Server trả về: " + res.statusCode);
                    console.log("Headers nhận được từ server: " + JSON.stringify(res.headers));
                }
            }).on("error", (err) => {
                console.error("Lỗi kết nối mạng: " + err.message);
            });
        }

        extractRealLink(targetUrl);
        '

    - name: Commit and Push changes
      run: |
        git config --global user.name "GitHub Action Bot"
        git config --global user.email "actions@github.com"
        git add link_sctv.txt
        git commit -m "Cập nhật link dùng UA Android Mobile và bypass 403" || echo "Không có thay đổi"
        git push
