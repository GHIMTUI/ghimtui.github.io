name: Extract IPTV Link to Text File With M3U8 Extension

on:
  schedule:
    - cron: '0 */2 * * *' # Chạy tự động mỗi 2 tiếng
  workflow_dispatch: # Nút bấm chạy bằng tay

jobs:
  extract-link:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: 20

    - name: Run JavaScript Extract Link
      run: |
        node -e '
        const http = require("http");
        const fs = require("fs");

        const targetUrl = "http://hoiquan.dpdns.org/VTVGo/?sctv4";

        function extractRealLink(url) {
            http.get(url, {
                headers: { "User-Agent": "Mozilla/5.0 (Windows NT 10.0; Win64; x64)" }
            }, (res) => {
                if ([301, 302, 307].includes(res.statusCode) && res.headers.location) {
                    let realUrl = res.headers.location.trim();
                    
                    // Kiểm tra xem link cuối cùng đã kết thúc bằng .m3u8 chưa
                    if (!realUrl.endsWith(".m3u8")) {
                        // Nếu link có dấu "?" (đang chứa token/tham số), ta nối thêm "&file=.m3u8"
                        if (realUrl.includes("?")) {
                            realUrl = realUrl + "&file=.m3u8";
                        } else {
                            // Nếu link trắng không có tham số, ta nối thêm "?file=.m3u8"
                            realUrl = realUrl + "?file=.m3u8";
                        }
                    }
                    
                    // Ghi vào file txt
                    fs.writeFileSync("link_sctv.txt", realUrl);
                    console.log("Đã bóc tách và ép đuôi m3u8 thành công: " + realUrl);
                } else {
                    console.log("Không tìm thấy link redirect. Mã lỗi: " + res.statusCode);
                }
            }).on("error", (err) => {
                console.error("Lỗi kết nối: " + err.message);
            });
        }

        extractRealLink(targetUrl);
        '

    - name: Commit and Push changes
      run: |
        git config --global user.name "GitHub Action Bot"
        git config --global user.email "actions@github.com"
        git add link_sctv.txt
        git commit -m "Cập nhật link chuẩn đuôi m3u8 vào link_sctv.txt" || echo "Không có thay đổi"
        git push
