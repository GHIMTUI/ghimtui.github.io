name: Cập nhật Link SCTV7 tự động

on:
  workflow_dispatch: # Cho phép bấm nút chạy thủ công
  schedule:
    - cron: '0 */3 * * *' # Tự động chạy lại mỗi 3 tiếng (vì link m3u8 thường hết hạn sau vài giờ)

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Kiểm tra mã nguồn (Checkout)
      uses: actions/checkout@v4

    - name: Cài đặt Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'

    - name: Cài đặt Playwright và các phần phụ thuộc
      run: |
        npm install playwright
        npx playwright install chromium --with-deps

    - name: Chạy script lấy link m3u8
      run: node get_link_sctv.js

    - name: Kiểm tra file sctv_link.txt vừa tạo
      run: |
        if [ -f "sctv_link.txt" ]; then
          cat sctv_link.txt
        else
          echo "File sctv_link.txt không tồn tại!"
          exit 1
        fi

    - name: Tự động Push file sctv_link.txt lên GitHub
      run: |
        git config --local user.email "github-actions[bot]@users.noreply.github.com"
        git config --local user.name "github-actions[bot]"
        git add sctv_link.txt
        # Chỉ commit nếu file có sự thay đổi (tránh lỗi nếu link trùng nhau)
        git diff-index --quiet HEAD || git commit -m "Cập nhật sctv_link.txt tự động [Skip CI]"
        git push
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
