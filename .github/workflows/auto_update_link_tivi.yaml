name: Auto update link tivi

on:
  schedule:
    # Chạy mỗi 4 giờ một lần (ví dụ: 0h, 4h, 8h, 12h, 16h, 20h UTC)
    - cron: '0 */4 * * *'
  workflow_dispatch: # Cho phép bấm chạy thủ công kiểm tra bất kỳ lúc nào

jobs:
  update-link:
    runs-on: ubuntu-latest
    permissions:
      contents: write # Cấp quyền ghi vào repo cho Action

    steps:
    - name: Kiểm tra mã nguồn (Checkout)
      uses: actions/checkout@v4

    - name: Thiết lập Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.x'

    - name: Cài đặt thư viện cần thiết
      run: |
        python -m pip install --upgrade pip
        pip install requests

    - name: Chạy script lấy link mới và sửa file m3u
      run: python auto_update_link_tivi.py

    - name: Commit và Push thay đổi lên GitHub
      run: |
        git config --global user.name "github-actions[bot]"
        git config --global user.email "github-actions[bot]@users.noreply.github.com"
        
        # Kiểm tra xem file tivi.m3u có thay đổi hay không trước khi commit
        if [ -n "$(git status --porcelain)" ]; then
          git add tivi.m3u
          git commit -m "Automated: Cập nhật link tivi mới nhất"
          git push
        else
          echo "Link không đổi so với link cũ, bỏ qua commit."
        fi
