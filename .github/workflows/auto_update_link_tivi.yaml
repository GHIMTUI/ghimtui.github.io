name: Auto Update SCTV

on:
  schedule:
    # Nhóm chạy 3 tiếng một lần (sctv14, sctv19, sctv21)
    - cron: '0 */3 * * *'
    # Nhóm chạy 12 tiếng một lần (các kênh còn lại)
    - cron: '0 */12 * * *'
  workflow_dispatch: # Cho phép bấm chạy thủ công tất cả các kênh

jobs:
  update-link:
    runs-on: ubuntu-latest
    permissions:
      contents: write # Cấp quyền ghi vào repo cho Action

    steps:
    - name: Kiểm tra mã nguồn (Checkout)
      uses: actions/checkout@v4

    - name: Thiết lập Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.x'

    - name: Cài đặt thư viện cần thiết
      run: |
        python -m pip install --upgrade pip
        pip install requests

    - name: Xác định nhóm kênh cần chạy dựa trên thời gian cron
      id: check-group
      run: |
        # Mặc định nếu chạy thủ công thì update tất cả các kênh
        UPDATE_TYPE="all"
        
        # Nếu chạy bằng schedule (cron)
        if [ "${{ github.event_name }}" = "schedule" ]; then
          CRON_TIME="${{ github.event.schedule }}"
          if [ "$CRON_TIME" = "0 */3 * * *" ]; then
            UPDATE_TYPE="fast"
          elif [ "$CRON_TIME" = "0 */12 * * *" ]; then
            UPDATE_TYPE="slow"
          fi
        fi
        
        echo "UPDATE_TYPE=$UPDATE_TYPE" >> $GITHUB_ENV
        echo "--> Nhóm kênh sẽ được cập nhật lần này: $UPDATE_TYPE"

    - name: Chạy script lấy link mới và sửa file m3u
      env:
        UPDATE_TYPE: ${{ env.UPDATE_TYPE }}
      run: python .github/workflows/auto_update_link_tivi.py

    - name: Commit và Push thay đổi lên GitHub
      run: |
        git config --global user.name "github-actions[bot]"
        git config --global user.email "github-actions[bot]@users.noreply.github.com"
        
        # Kiểm tra xem file tivi.m3u có thay đổi hay không trước khi commit
        if [ -n "$(git status --porcelain)" ]; then
          git add tivi.m3u
          git commit -m "Automated: Cập nhật link sctv theo lịch ($UPDATE_TYPE)"
          git push
        else
          echo "Link hôm nay không đổi so với link cũ, bỏ qua commit."
        fi
