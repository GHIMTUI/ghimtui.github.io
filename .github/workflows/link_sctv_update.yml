name: Auto Update IPTV Links

on:
  schedule:
    # Chạy mỗi 2 tiếng (0 phút, mỗi 2 giờ trong ngày)
    - cron: '0 */2 * * *'
  workflow_dispatch: # Nút bấm để bạn có thể tự kích hoạt chạy bằng tay lúc nào muốn

jobs:
  update-links:
    runs-on: ubuntu-latest
    permissions:
      contents: write # Cấp quyền cho Action được push code/file mới lên lại repo

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.x'

    - name: Run Update Script
      run: python link_sctv_update.py

    - name: Commit and Push Changes
      run: |
        git config --global user.name "GitHub Action Bot"
        git config --global user.email "action@github.com"
        git add tivi.m3u
        # Chỉ commit nếu file có sự thay đổi (tránh lỗi nếu link cũ và link mới giống nhau)
        git diff-index --quiet HEAD || git commit -m "Auto-updated IPTV links [Skip CI]"
        git push
