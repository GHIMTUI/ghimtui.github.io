name: Auto Update M3U Links

on:
  schedule:
    - cron: '0 */2 * * *'
  workflow_dispatch:

jobs:
  update-m3u:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.x'

    # SỬA TẠI ĐÂY: Đổi tên thành link_sctv_update.py cho đúng với file của bạn
    - name: Run update script
      run: python link_sctv_update.py

    # SỬA TẠI ĐÂY: Thêm lệnh kiểm tra lỗi cấu trúc để chắc chắn commit được đẩy lên
    - name: Commit and Push changes
      run: |
        git config --local user.email "github-actions[bot]@users.noreply.github.com"
        git config --local user.name "github-actions[bot]"
        
        # Ép buộc nhận diện file tivi.m3u ở thư mục gốc
        git add tivi.m3u
        
        if git diff --staged --quiet; then
          echo "Không có link nào thay đổi so với bản cũ."
        else
          git commit -m "Auto-update tivi.m3u links [skip ci]"
          git push origin main
        fi
