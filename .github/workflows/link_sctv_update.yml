steps:
      - name: Lấy mã nguồn về
        uses: actions/checkout@v4

      - name: Cài đặt Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      # Thêm đúng đoạn này vào để Github cài thư viện chống bot
      - name: Cài đặt thư viện cần thiết
        run: pip install cloudscraper

      - name: Chạy script lấy link mới
        run: python link_sctv_update.py

      - name: Lưu các file lên Github (Commit & Push)
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add tivi.m3u file/link_sctv_update.txt
          git diff --quiet && git diff --staged --quiet || git commit -m "Auto-update: Cập nhật link SCTV mới"
          git push
