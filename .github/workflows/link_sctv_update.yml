name: Auto Update SCTV Link

on:
  schedule:
    - cron: '0 */2 * * *'
  workflow_dispatch:

jobs:
  update-list:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    # 👇 THÊM ĐOẠN NÀY VÀO ĐỂ ÉP GITHUB CHẠY NODE 24 THEO ĐÚNG YÊU CẦU
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

    steps:
    - name: Checkout mã nguồn
      uses: actions/checkout@v4

    - name: Cài đặt Node.js
      uses: actions/setup-node@v4
      with:
        node-version: 24 # Đảm bảo dòng này đã sửa thành 24

    - name: Chạy script cập nhật link
      run: node link_sctv_update.js

    - name: Commit và Push nếu có thay đổi
      run: |
        git config --local user.email "github-actions[bot]@users.noreply.github.com"
        git config --local user.name "github-actions[bot]"
        git diff --quiet || (git add . && git commit -m "Bot: Cập nhật link SCTV mới [$(date +'%Y-%m-%d %H:%M:%S')]" && git push)
