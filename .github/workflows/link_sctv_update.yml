name: Tự động cập nhật link SCTV

on:
  schedule:
    - cron: '0 */2 * * *' # Tự động chạy mỗi 2 giờ
  workflow_dispatch:      # Bấm chạy bằng tay để kiểm tra

jobs:
  update-m3u:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Lấy mã nguồn từ Repository
        uses: actions/checkout@v4

      - name: Cài đặt Node.js
        uses: actions/setup-node@v4
        with:
          node-node-version: '20' # Sử dụng Node.js bản cập nhật mới định dạng chuẩn

      - name: Chạy script Node.js lấy link và cập nhật
        run: node link_sctv_update.js

      - name: Lưu các file lên Github (Commit & Push)
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          
          git add tivi.m3u file/link_sctv_update.txt
          
          git diff --quiet && git diff --staged --quiet || git commit -m "Auto-update: Cập nhật link SCTV bằng Node.js"
          git push
