name: Auto Update M3U Links

on:
  schedule:
    - cron: '0 */2 * * *'
  workflow_dispatch:

jobs:
  update-m3u:
    runs-on: ubuntu-latest
    # Sử dụng container giả lập trình duyệt xịn để vượt Cloudflare
    container:
      image: lwthiker/curl-impersonate:main-chrome

    steps:
    # 1. Cài đặt các công cụ cơ bản cho container
    - name: Install git and python
      run: |
        apt-get update
        apt-get install -y git python3

    # 2. Lấy code từ repository về
    - name: Checkout repository
      uses: actions/checkout@v4

    # 3. Chạy script Python để quét và lấy link
    - name: Run update script
      run: python3 link_sctv_update.py

    # 4. Lưu lại và đẩy file tivi.m3u mới lên hệ thống
    - name: Commit and Push changes
      run: |
        git config --global --add safe.directory "$GITHUB_WORKSPACE"
        git config --local user.email "github-actions[bot]@users.noreply.github.com"
        git config --local user.name "github-actions[bot]"
        git add tivi.m3u
        if git diff --staged --quiet; then
          echo "Không có link nào thay đổi."
        else
          git commit -m "Auto-update tivi.m3u links [skip ci]"
          git push origin main
        fi
